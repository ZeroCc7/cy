    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
    // Moon icon — click to go dark
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}

function updateCharBtn() {
  const n = S.characters.length;
  const btn = $('char-btn');
  const badge = $('char-count');
  if (!btn) return;
  const hasWb = !!S.worldbuilding;
  btn.disabled = !hasWb;
  if (n > 0) {
    btn.classList.add('has-chars');
    badge.textContent = n;
  } else {
    btn.classList.remove('has-chars');
  }
}

function openCharPanel() {
  if (!S.worldbuilding) return;
  const panel = $('char-panel');
  if (panel.style.display !== 'none') { closeCharPanel(); return; }
  panel.style.display = 'flex';
  renderCharPanel();
  anim.in(panel, {x: 20, duration: 0.28});
}

function closeCharPanel() {
  $('char-panel').style.display = 'none';
}

function renderCharPanel() {
  const body = $('char-panel-body');
  const pactions = $('char-panel-pactions');
  if (!body) return;

  if (S.characters.length === 0) {
    body.innerHTML = `
      <div class="char-panel-empty">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="9" cy="7" r="4"/>
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          <circle cx="17" cy="9" r="3"/>
          <path d="M21 21v-2a3 3 0 0 0-2-2.83"/>
        </svg>
        <p>尚未提取角色</p>
        <small>从世界观文档中自动识别角色，并为每个角色生成专属人设图提示词</small>
        <button class="char-panel-extract-btn" id="char-panel-extract-cta" onclick="extractCharacters()">✦ 提取角色</button>
      </div>`;
    pactions.innerHTML = '';
  } else {
    body.innerHTML = `<div class="char-grid" id="char-panel-grid"></div>`;
    const grid = $('char-panel-grid');
    S.characters.forEach(c => grid.appendChild(makeCharCard(c)));
    anim.cardsIn('.char-panel .char-card', 0.06);
    pactions.innerHTML = `
      <button class="char-add-btn" onclick="addNewChar()">+ 新增角色</button>
      <button class="char-add-btn" id="char-panel-reextract-btn" onclick="extractCharacters()">↺ 重新提取</button>`;
  }
  updateCharBtn();
}

function makeCharCard(c) {
  const card = document.createElement('div');
  card.className = 'char-card' + (c.generating ? ' generating' : '');
  card.id = `cc-${c.id}`;
  let avatarInner;
  if (c.generating) {
    avatarInner = `<div class="char-generating-overlay"><span class="char-spinner"></span><span>生成中…</span></div>`;
  } else if (c.imageUrl) {
    avatarInner = `<img src="${c.imageUrl}" alt="${c.name}" onclick="openLightbox('${c.imageUrl}','${c.name.replace(/'/g,"\\'")}');event.stopPropagation()">`;
  } else {
    avatarInner = `<span class="char-avatar-placeholder">${c.name.charAt(0)}</span>`;
  }
  card.innerHTML = `
    <div class="char-avatar">${avatarInner}</div>
    <div class="char-info">
      <div class="char-name">${c.name}</div>
      <span class="char-role-badge ${c.role}">${roleLabel[c.role] || c.role}</span>
    </div>
    <button class="char-edit-btn" onclick="openCharModal('${c.id}');event.stopPropagation()">编辑</button>`;
  return card;
}

async function saveCharacters() {
  if (!S.projectId) return;
  updateCharBtn();
  try {
    // strip transient UI state before persisting
    const toSave = S.characters.map(({generating, ...c}) => c);
    await fetch(`/api/project/${S.projectId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({field: 'characters', characters: toSave}),
    });
  } catch { /* 静默失败 */ }
}

async function extractCharacters() {
  if (!S.worldbuilding) return;
  if (S.characters.length > 0) {
    const hasImages = S.characters.some(c => c.imageUrl);
    const warn = hasImages ? '（含已生成/上传的图片将一并丢失）' : '';
    if (!confirm(`已有 ${S.characters.length} 个角色${warn}，重新提取将覆盖全部现有角色。确认继续？`)) return;
  }
  const btn = $('char-btn');
  if (btn) btn.disabled = true;
  // Ensure panel is open and show loading state
  const panel = $('char-panel');
  if (panel && panel.style.display === 'none') {
    panel.style.display = 'flex';
    $('char-panel-pactions').innerHTML = '';
  }
  if ($('char-panel-body')) {
    $('char-panel-body').innerHTML = `
      <div class="char-panel-empty">
        <span class="char-spinner" style="width:32px;height:32px"></span>
        <p>正在提取角色…</p>
        <small>AI 正在分析世界观文档，识别角色并生成人设提示词</small>
      </div>`;
  }
  try {
    const resp = await fetch(`/api/project/${S.projectId}/extract-characters`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({worldbuilding: S.worldbuilding}),
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }
    const list = await resp.json();
    if (!Array.isArray(list)) throw new Error('返回数据不是数组: ' + JSON.stringify(list));
    S.characters = list.map((c, i) => ({
      id: c.id || `char_${Date.now()}_${i}`,
      name: c.name || '未命名',
      age: c.age || '',
      role: ['protagonist','antagonist','supporting'].includes(c.role) ? c.role : 'supporting',
      personality: c.personality || '',
      appearance: c.appearance || '',
      imageUrl: null,
      genPrompt: c.genPrompt || '',
    }));
    renderCharPanel();
    await saveCharacters();
  } catch(e) {
    console.error('extractCharacters failed:', e);
    appendMsg('system', `角色提取失败：${e.message}`);
  } finally {
    updateCharBtn();
  }
}

let _editingCharId = null;

function openCharModal(charId) {
  const c = S.characters.find(x => x.id === charId);
  if (!c) return;
  _editingCharId = charId;
  $('char-modal-title').textContent = '编辑角色';
  $('char-f-name').value        = c.name;
  $('char-f-age').value         = c.age || '';
  $('char-f-role').value        = c.role;
  $('char-f-personality').value = c.personality;
  $('char-f-appearance').value  = c.appearance;
  $('char-f-genprompt').value   = c.genPrompt || '';
  _refreshModalAvatar(c.imageUrl, c.name);
  const genBtn = $('char-gen-btn');
  if (genBtn) genBtn.disabled = !!c.generating;
  $('char-delete-btn').style.display = '';
  $('char-modal-overlay').style.display = 'flex';
}

function addNewChar() {
  const newChar = {
    id: `char_${Date.now()}`,
    name: '新角色', age: '', role: 'supporting',
    personality: '', appearance: '', imageUrl: null, genPrompt: '',
  };
  S.characters.push(newChar);
  _editingCharId = newChar.id;
  $('char-modal-title').textContent = '新增角色';
  $('char-f-name').value        = newChar.name;
  $('char-f-age').value         = '';
  $('char-f-role').value        = newChar.role;
  $('char-f-personality').value = '';
  $('char-f-appearance').value  = '';
  $('char-f-genprompt').value   = '';
  _refreshModalAvatar(null, newChar.name);
  $('char-delete-btn').style.display = '';
  $('char-modal-overlay').style.display = 'flex';
}

function closeCharModal() {
  $('char-modal-overlay').style.display = 'none';
  _editingCharId = null;
}

function _refreshModalAvatar(imageUrl, name) {
  const av = $('char-modal-avatar');
  if (imageUrl) {
    const safe = (name||'').replace(/'/g, "\\'");
    av.innerHTML = `<img src="${imageUrl}" alt="${name}" onclick="openLightbox('${imageUrl}','${safe}')">`;
  } else {
    av.innerHTML = `<span class="char-modal-avatar-ph">${(name||'?').charAt(0)}</span>`;
  }
}

async function saveCharModal() {
  const idx = S.characters.findIndex(x => x.id === _editingCharId);
  if (idx === -1) return;
  S.characters[idx] = {
    ...S.characters[idx],
    name:        $('char-f-name').value.trim() || '未命名',
    age:         $('char-f-age').value.trim(),
    role:        $('char-f-role').value,
    personality: $('char-f-personality').value.trim(),
    appearance:  $('char-f-appearance').value.trim(),
    genPrompt:   $('char-f-genprompt').value.trim(),
  };
  closeCharModal();
  renderCharPanel();
  await saveCharacters();
}

async function reextractChar() {
  if (!_editingCharId || !S.projectId || !S.worldbuilding) return;
  const btn = $('char-reextract-btn');
  btn.disabled = true; btn.textContent = '提取中…';
  const name = $('char-f-name').value.trim() || '未命名';
  try {
    const resp = await fetch(`/api/project/${S.projectId}/reextract-character`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({worldbuilding: S.worldbuilding, name}),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();
    if (data.age)         $('char-f-age').value          = data.age;
    if (data.role)        $('char-f-role').value         = data.role;
    if (data.personality) $('char-f-personality').value  = data.personality;
    if (data.appearance)  $('char-f-appearance').value   = data.appearance;
    if (data.genPrompt)   $('char-f-genprompt').value    = data.genPrompt;
    const idx = S.characters.findIndex(x => x.id === _editingCharId);
    if (idx !== -1 && data.genPrompt) S.characters[idx].genPrompt = data.genPrompt;
  } catch(e) {
    console.error('reextractChar failed:', e);
    alert(`重新提取失败：${e.message}`);
  } finally {
    btn.disabled = false; btn.textContent = '↺ 重新提取';
  }
}

async function deleteCharFromModal() {
  if (!_editingCharId) return;
  if (!confirm('确认删除此角色？')) return;
  S.characters = S.characters.filter(x => x.id !== _editingCharId);
  closeCharModal();
  renderCharPanel();
  await saveCharacters();
}

async function uploadCharImage(input) {
  if (!input.files[0] || !_editingCharId || !S.projectId) return;
  const btn = input.previousElementSibling;
  btn.disabled = true; btn.textContent = '上传中…';
  const fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    const resp = await fetch(
      `/api/project/${S.projectId}/characters/${_editingCharId}/upload-image`,
      {method: 'POST', body: fd}
    );
    const {url} = await resp.json();
    const idx = S.characters.findIndex(x => x.id === _editingCharId);
    if (idx !== -1) S.characters[idx].imageUrl = url;
    _refreshModalAvatar(url, S.characters[idx]?.name || '');
    await saveCharacters();
    renderCharPanel();
  } catch {
    alert('图片上传失败，请重试');
  } finally {
    btn.disabled = false; btn.textContent = '上传图片';
    input.value = '';
  }
}

let _genDialogCharId = null;

function _buildGenPrompt(c) {
  if (c.genPrompt) return c.genPrompt;
  const name = c.name || '神秘人物';
  const appearance = (c.appearance || '').trim();
  const base = appearance ? `角色「${name}」，${appearance}` : `角色「${name}」`;
  return `${base}。古装写实风格，人物设定图，全身正面站立，精致五官，华丽古装服饰，衣袂飘逸，细腻笔触，简洁渐变背景，高清插画`;
}

function openLightbox(url, name) {
  $('img-lightbox-img').src = url;
  $('img-lightbox-name').textContent = name || '';
  $('img-lightbox').style.display = 'flex';
}
function closeLightbox() {
  $('img-lightbox').style.display = 'none';
  $('img-lightbox-img').src = '';
}

function openGenDialog() {
  if (!_editingCharId) return;
  const c = S.characters.find(x => x.id === _editingCharId);
  if (!c || c.generating) return;
  _genDialogCharId = _editingCharId;
  $('gen-prompt').value = _buildGenPrompt(c);
  $('gen-dialog-overlay').style.display = 'flex';
}

function closeGenDialog() {
  $('gen-dialog-overlay').style.display = 'none';
  _genDialogCharId = null;
}

function confirmGenImage() {
  const cid = _genDialogCharId;
  if (!cid || !S.projectId) return;
  const prompt = $('gen-prompt').value.trim();
  const model  = $('gen-model').value;
  const idx = S.characters.findIndex(x => x.id === cid);
  if (idx === -1) return;

  closeGenDialog();

  S.characters[idx].generating = true;
  renderCharPanel();
  const genBtn = $('char-gen-btn');
  if (genBtn && _editingCharId === cid) genBtn.disabled = true;

  fetch(`/api/project/${S.projectId}/characters/${cid}/generate-image`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({appearance: S.characters[idx]?.appearance || '', prompt, model}),
  })
  .then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(`HTTP ${r.status}: ${t}`); }))
  .then(({url}) => {
    const i = S.characters.findIndex(x => x.id === cid);
    if (i !== -1) { S.characters[i].imageUrl = url; S.characters[i].generating = false; }
    renderCharPanel();
    if (_editingCharId === cid) _refreshModalAvatar(url, S.characters[i]?.name || '');
    saveCharacters();
  })
  .catch(e => {
    console.error('generate-image failed:', e);
    const i = S.characters.findIndex(x => x.id === cid);
    if (i !== -1) S.characters[i].generating = false;
    renderCharPanel();
    if (_editingCharId === cid && $('char-gen-btn')) $('char-gen-btn').disabled = false;
    alert(`图片生成失败：${e.message}`);
  });
}

// ══════════════════════════════════════════════════════════════════
//  Markdown renderer
// ══════════════════════════════════════════════════════════════════
function md(t) {
  if(!t) return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^\|(.+)\|$/gm,(_,row)=>{
      const cells=row.split('|').map(c=>c.trim());
      return '<tr>'+cells.map(c=>`<td>${c}</td>`).join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g,m=>{
      const rows=m.trim().split('\n');
      const head=rows[0].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');
      const body=rows.slice(1).filter(r=>!r.includes('---')).join('\n');
      return `<table>${head}${body}</table>`;
    })
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/「([^」]+)」/g,'「<em>$1</em>」')
    .replace(/\n{2,}/g,'\n')
    .split('\n').map(line=>{
      if(/^<(h[1-3]|hr|table|blockquote|tr|th|td)/.test(line)) return line;
      return line?`<p>${line}</p>`:'';
    }).join('');
}
</script>

<!-- ── Image Lightbox ── -->
<div class="img-lightbox" id="img-lightbox" style="display:none" onclick="closeLightbox()">
  <img id="img-lightbox-img" src="" alt="">
  <span class="img-lightbox-name" id="img-lightbox-name"></span>
</div>

<!-- ── Gen Image Dialog ── -->
<div class="gen-dialog-overlay" id="gen-dialog-overlay" style="display:none"
     onclick="if(event.target===this)closeGenDialog()">
  <div class="gen-dialog">
    <h4>生成角色设定图</h4>
    <div class="gen-field">
      <label>提示词</label>
      <textarea id="gen-prompt" placeholder="描述角色外貌特征…"></textarea>
    </div>
    <div class="gen-field">
      <label>模型</label>
      <select id="gen-model">
        <option value="gpt-image-2">GPT Image 2</option>
        <option value="wan2.7-image-pro">万象 2.7 Pro</option>
        <option value="wan2.7-image">万象 2.7</option>
      </select>
    </div>
    <div class="gen-dialog-footer">
      <button class="gen-cancel-btn" onclick="closeGenDialog()">取消</button>
      <button class="gen-confirm-btn" onclick="confirmGenImage()">✦ 生成</button>
    </div>
  </div>
</div>

<!-- ── Character Modal ── -->
<div class="char-modal-overlay" id="char-modal-overlay" style="display:none"
     onclick="if(event.target===this)closeCharModal()">
  <div class="char-modal">
    <div class="char-modal-hdr">
      <h3 id="char-modal-title">编辑角色</h3>
      <button class="char-reextract-btn" id="char-reextract-btn" onclick="reextractChar()">↺ 重新提取</button>
      <button class="char-modal-close" onclick="closeCharModal()">✕</button>
    </div>
    <div class="char-modal-body">
      <div class="char-modal-left">
        <div class="char-modal-avatar" id="char-modal-avatar">
          <span class="char-modal-avatar-ph" id="char-modal-avatar-ph">?</span>
        </div>
        <input type="file" id="char-file-input" accept="image/*" style="display:none"
               onchange="uploadCharImage(this)">
        <button class="char-img-btn" onclick="$('char-file-input').click()">上传图片</button>
        <button class="char-img-btn" id="char-gen-btn" onclick="openGenDialog()">✦ AI 生成图</button>
      </div>
      <div class="char-modal-right">
        <div class="char-field" style="display:flex;gap:10px">
          <div style="flex:1">
            <label>姓名</label>
            <input id="char-f-name" type="text" placeholder="角色姓名">
          </div>
          <div style="width:90px">
            <label>年龄</label>
            <input id="char-f-age" type="text" placeholder="如 18岁">
          </div>
        </div>
        <div class="char-field">
          <label>定位</label>
          <select id="char-f-role">
            <option value="protagonist">主角</option>
            <option value="antagonist">反派</option>
            <option value="supporting">配角</option>
          </select>
        </div>
        <div class="char-field">
          <label>性格</label>
          <textarea id="char-f-personality" placeholder="性格描述，30字内"></textarea>
        </div>
        <div class="char-field">
          <label>外貌描述</label>
          <textarea id="char-f-appearance" placeholder="外貌特征，40字内，用于 AI 生图"></textarea>
        </div>
        <div class="char-field">
          <label>生图提示词</label>
          <textarea id="char-f-genprompt" placeholder="AI 生图时使用的完整提示词，提取角色时自动生成"></textarea>
        </div>
      </div>
    </div>
    <div class="char-modal-footer">
      <button class="char-delete-btn" id="char-delete-btn" onclick="deleteCharFromModal()">删除角色</button>
      <button class="char-save-btn" onclick="saveCharModal()">保存</button>
    </div>
  </div>
</div>
</body>
