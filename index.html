<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>短视频剧本生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif;
  background:#0f0f13;color:#e0d8c8;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
header{display:flex;align-items:center;gap:10px;padding:11px 18px;
  background:#17171f;border-bottom:1px solid #22222f;flex-shrink:0}
header h1{font-size:15px;font-weight:600;color:#c9a96e;letter-spacing:.05em;white-space:nowrap}
.step-bar{display:flex;gap:3px;margin-left:auto;align-items:center}
.step{padding:4px 10px;border-radius:20px;font-size:11.5px;border:1px solid #2a2a38;
  color:#555;transition:all .3s;white-space:nowrap}
.step.active{background:#c9a96e22;border-color:#c9a96e;color:#c9a96e;font-weight:600}
.step.done{background:#1e2a1e;border-color:#3a6a3a;color:#6ab06a;cursor:pointer}
.step.done:hover{background:#243024;border-color:#4a8a4a}
.step-arrow{color:#2a2a38;font-size:10px}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;
  border:1px solid #2a2a38;background:transparent;color:#777;font-size:12px;
  cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:6px}
.hdr-btn:hover{background:#1e1e2a;color:#c9a96e;border-color:#c9a96e55}
.hdr-btn.active{background:#1e1e2a;color:#c9a96e;border-color:#c9a96e66}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Chat Panel ── */
.chat-panel{display:flex;flex-direction:column;width:380px;flex-shrink:0;
  border-right:1px solid #1e1e28;background:#0d0d11}
.messages{flex:1;overflow-y:auto;padding:14px 12px;
  display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:#1e1e2a;border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:90%;gap:3px}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-lbl{font-size:11px;color:#383848;padding:0 4px}
.msg.user .msg-lbl{text-align:right;color:#c9a96e55}
.bubble{padding:8px 12px;border-radius:13px;font-size:13.5px;
  line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:#c9a96e;color:#1a1208;border-bottom-right-radius:3px}
.msg.assistant .bubble{background:#191926;color:#d8d0c0;
  border-bottom-left-radius:3px;border:1px solid #242433}
.msg.system{align-self:center}
.msg.system .bubble{background:none;border:1px dashed #2a2a3a;color:#555;
  font-size:11.5px;border-radius:8px;padding:5px 12px;text-align:center}

.chat-footer{padding:9px 11px 11px;border-top:1px solid #181822;
  background:#0d0d11;display:flex;flex-direction:column;gap:7px}
.chips-row{display:flex;flex-wrap:wrap;gap:5px}
.input-row{display:flex;gap:7px;align-items:flex-end}
textarea{flex:1;background:#161625;border:1px solid #232333;border-radius:11px;
  color:#e8e0d0;font-size:13.5px;font-family:inherit;padding:8px 12px;
  resize:none;outline:none;line-height:1.5;max-height:110px;transition:border-color .2s}
textarea:focus{border-color:#c9a96e44}
textarea::placeholder{color:#2e2e45}
textarea:disabled{opacity:.4}
.send-btn{background:#c9a96e;color:#1a1208;border:none;border-radius:9px;
  width:36px;height:36px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
.send-btn:hover{background:#d4b87a}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{background:#1e1e2a;color:#3a3a50;cursor:not-allowed}
.send-btn svg{width:15px;height:15px}
.chip{padding:4px 12px;border-radius:18px;font-size:12px;border:1px solid #272737;
  background:#151525;color:#c9a96e;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{background:#c9a96e15;border-color:#c9a96e77}
.chip:disabled{opacity:.4;cursor:not-allowed}
.chip.primary{background:#c9a96e;color:#1a1208;border-color:#c9a96e;font-weight:600}
.chip.primary:hover{background:#d4b87a}
.num-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.num-row label{font-size:12px;color:#777}
.num-input{width:56px;background:#161625;border:1px solid #232333;border-radius:7px;
  color:#e8e0d0;font-size:13px;padding:4px 8px;outline:none;text-align:center}
.num-input:focus{border-color:#c9a96e44}
.refine-hint{background:#1a160a;border:1px solid #c9a96e33;border-radius:7px;
  padding:6px 11px;font-size:12px;color:#c9a96e88;
  display:flex;align-items:center;justify-content:space-between}
.refine-cancel{cursor:pointer;color:#555;font-size:11px}
.refine-cancel:hover{color:#888}

/* ── Content Panel ── */
.content-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.content-toolbar{display:flex;align-items:center;gap:7px;padding:8px 18px;
  border-bottom:1px solid #1a1a26;background:#0f0f18;
  flex-shrink:0;min-height:44px;flex-wrap:wrap}
.ctitle{font-size:12px;color:#555;margin-right:auto}
.cbody{flex:1;overflow-y:auto;padding:22px 26px}
.cbody::-webkit-scrollbar{width:3px}
.cbody::-webkit-scrollbar-thumb{background:#1e1e2a;border-radius:2px}

/* Markdown */
.rendered{font-size:13.5px;line-height:1.85;color:#c8c0b0;max-width:860px}
.rendered h1{color:#c9a96e;font-size:18px;margin-bottom:13px;
  border-bottom:1px solid #2a2a3840;padding-bottom:7px}
.rendered h2{color:#a88a5a;font-size:15px;margin:20px 0 8px}
.rendered h3{color:#7a6840;font-size:13.5px;margin:13px 0 5px}
.rendered p{margin-bottom:8px}
.rendered strong{color:#ddd0a8}
.rendered em{color:#b0a070;font-style:normal}
.rendered hr{border:none;border-top:1px solid #1e1e2a;margin:14px 0}
.rendered blockquote{border-left:3px solid #c9a96e33;padding:5px 13px;color:#908070;
  margin:7px 0;background:#18181f20;border-radius:0 5px 5px 0;font-style:italic}
.rendered code{background:#181828;padding:1px 5px;border-radius:3px;
  font-family:monospace;font-size:12px;color:#c9a96e}
.rendered table{border-collapse:collapse;width:100%;margin:10px 0}
.rendered th{background:#1a1a28;color:#c9a96e;padding:6px 11px;
  border:1px solid #252535;font-size:12.5px;text-align:left}
.rendered td{padding:5px 11px;border:1px solid #1a1a26;font-size:12.5px;color:#a8a090}
.rendered tr:nth-child(even) td{background:#111118}

/* Episode grid */
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px}
.ep-card{background:#111120;border:1px solid #202030;border-radius:9px;
  padding:12px;cursor:pointer;transition:all .2s}
.ep-card:hover{border-color:#c9a96e44;background:#171728}
.ep-card.generating{border-color:#c9a96e;animation:pulse .9s ease-in-out infinite alternate}
.ep-card.done{border-color:#2a5a2a;background:#111a11;cursor:default}
.ep-card.done:hover{border-color:#3a7a3a}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
.ep-num{font-size:10.5px;color:#444;margin-bottom:4px}
.ep-card-title{font-size:12.5px;color:#c9a96e;line-height:1.4}
.ep-card.done .ep-card-title{color:#7aaa7a}
.ep-status{font-size:11px;margin-top:5px;color:#383848}
.ep-card.done .ep-status{color:#3a7a3a}
.ep-actions{display:flex;gap:5px;margin-top:8px}
.ep-action-btn{font-size:11px;padding:3px 8px;border-radius:9px;
  border:1px solid #252535;background:#161625;color:#c9a96e;cursor:pointer;transition:all .15s}
.ep-action-btn:hover{background:#c9a96e15}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px}
.empty-state svg{width:40px;height:40px;opacity:.2;color:#888}
.empty-state p{font-size:13.5px;color:#3a3a50}
.empty-state small{font-size:12px;color:#252535}

.typing-cursor{display:inline-block;width:2px;height:13px;background:#c9a96e;
  border-radius:1px;animation:blink .9s step-end infinite;
  vertical-align:text-bottom;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ═══════════════════════════════════════════════════════════
   History / Project Panel
   ══════════════════════════════════════════════════════════ */
.history-panel{position:absolute;inset:0;background:#0d0d13;
  display:flex;flex-direction:column;z-index:20}
.history-hdr{display:flex;align-items:center;padding:0 16px;
  border-bottom:1px solid #1a1a26;background:#101018;
  flex-shrink:0;height:44px;gap:12px}
.history-hdr h2{font-size:14px;color:#c9a96e;font-weight:600}
.h-close{margin-left:auto;background:none;border:none;color:#444;font-size:16px;
  cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1}
.h-close:hover{color:#bbb;background:#1e1e2a}
.history-body{display:flex;flex:1;overflow:hidden}

/* 左侧项目列表 */
.h-list{width:260px;flex-shrink:0;border-right:1px solid #1a1a26;
  overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:3px}
.h-list::-webkit-scrollbar{width:3px}
.h-list::-webkit-scrollbar-thumb{background:#1e1e2a}

.proj-card{padding:10px 12px;border-radius:9px;cursor:pointer;
  border:1px solid transparent;transition:all .15s}
.proj-card:hover{background:#161625;border-color:#252535}
.proj-card.selected{background:#1a1a28;border-color:#c9a96e33}
.proj-title{font-size:13px;color:#c9a96e;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap}
.phase-badge{font-size:10px;padding:1px 7px;border-radius:8px;border:1px solid;white-space:nowrap}
.phase-badge.chat        {color:#777;   border-color:#2a2a38}
.phase-badge.worldbuilding{color:#c09060;border-color:#c0906033;background:#c090600d}
.phase-badge.outline     {color:#7aaadd;border-color:#7aaadd33;background:#7aaadd0d}
.phase-badge.episodes    {color:#7aba7a;border-color:#7aba7a33;background:#7aba7a0d}
.proj-time{font-size:10px;color:#383848}
.proj-progress{font-size:10px;color:#4a4a6a}

/* 右侧项目详情 */
.h-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.h-detail-hdr{padding:12px 18px 10px;border-bottom:1px solid #1a1a26;flex-shrink:0}
.h-detail-title{font-size:15px;color:#c9a96e;font-weight:600;margin-bottom:4px}
.h-detail-sub{font-size:12px;color:#555;margin-bottom:10px}
.h-detail-actions{display:flex;gap:7px;flex-wrap:wrap}

/* 内容标签行 */
.h-tabs-row{display:flex;gap:5px;padding:8px 18px;border-bottom:1px solid #1a1a26;
  flex-shrink:0;overflow-x:auto;flex-wrap:nowrap}
.h-tabs-row::-webkit-scrollbar{height:3px}
.h-tabs-row::-webkit-scrollbar-thumb{background:#1e1e2a}
.ctab{padding:4px 11px;border-radius:16px;font-size:12px;border:1px solid #252535;
  background:#111120;color:#777;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ctab:hover{background:#1a1a28;color:#aaa}
.ctab.active{background:#c9a96e22;border-color:#c9a96e66;color:#c9a96e}
.ctab.done{border-color:#2a5a2a;color:#6aba6a}
.ctab.done.active{background:#1a281a;border-color:#4a8a4a;color:#8ada8a}
.ctab:disabled{opacity:.35;cursor:not-allowed}

/* 详情内容区 */
.h-content{flex:1;overflow-y:auto;padding:20px 22px}
.h-content::-webkit-scrollbar{width:3px}
.h-content::-webkit-scrollbar-thumb{background:#1e1e2a}
.h-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:#2a2a3a;font-size:13px}

/* 修改栏 */
.h-refine-bar{border-top:1px solid #1a1a26;padding:10px 14px;
  background:#0a0a10;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.h-refine-bar textarea{flex:1;background:#161625;border:1px solid #252535;
  border-radius:9px;color:#e0d8c8;font-size:13px;font-family:inherit;
  padding:7px 11px;resize:none;outline:none;max-height:90px}
.h-refine-bar textarea:focus{border-color:#c9a96e44}
.h-refine-btn{padding:7px 14px;border-radius:8px;border:none;
  font-size:12.5px;cursor:pointer;transition:all .15s;flex-shrink:0}
.h-refine-send{background:#c9a96e;color:#1a1208;font-weight:600}
.h-refine-send:hover{background:#d4b87a}
.h-refine-cancel-btn{background:#1e1e2a;color:#777}
.h-refine-cancel-btn:hover{color:#aaa}

/* 空历史 */
.h-list-empty{padding:24px 12px;text-align:center;color:#383848;font-size:12.5px;line-height:1.8}

.primary-hdr-btn{background:#c9a96e;color:#1a1208;border-color:#c9a96e;font-weight:600}
.primary-hdr-btn:hover{background:#d4b87a;border-color:#d4b87a}

.home-body{flex:1;overflow-y:auto;padding:28px 32px}
.home-body::-webkit-scrollbar{width:3px}
.home-body::-webkit-scrollbar-thumb{background:#1e1e2a}
.home-section-title{font-size:13px;color:#555;margin-bottom:14px}
.proj-grid-home{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}
.proj-card-home{background:#111120;border:1px solid #1e1e2c;border-radius:11px;
  padding:14px 16px;cursor:pointer;transition:all .18s}
.proj-card-home:hover{border-color:#c9a96e44;background:#17172a}
.pch-title{font-size:14px;color:#c9a96e;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.pch-meta{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.pch-progress{font-size:11px;color:#4a6a4a}
.pch-footer{display:flex;align-items:center;justify-content:space-between}
.pch-time{font-size:11px;color:#383848}
.pch-delete{background:none;border:none;color:#2a2a3a;font-size:18px;
  cursor:pointer;padding:0 4px;border-radius:4px;line-height:1;transition:color .15s}
.pch-delete:hover{color:#c06060}
.home-empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;gap:12px}
.home-empty p{font-size:14px;color:#3a3a50}
.home-empty small{font-size:12px;color:#252535}
</style>
</head>
<body>
<div id="home-view" style="display:none;flex-direction:column;height:100vh;background:#0f0f13"></div>
<header>
  <button class="hdr-btn" id="back-home-btn" onclick="goto('#/')" style="display:none">← 首页</button>
  <h1>✦ 短视频剧本生成器</h1>
  <div class="step-bar" id="step-bar">
    <div class="step active" id="s1">① 聊需求</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s2">② 世界观</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s3">③ 大纲</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s4">④ 剧本</div>
  </div>
  <button class="hdr-btn primary-hdr-btn" id="new-proj-btn" onclick="goto('#/project/new')" style="display:none">+ 新建剧本</button>
  <button class="hdr-btn" id="history-btn" onclick="toggleHistory()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="12 8 12 12 14 14"/>
      <path d="M3.05 11a9 9 0 1 0 .5-4"/><polyline points="3 3 3 7 7 7"/>
    </svg>
    项目历史
  </button>
</header>

<div class="layout">
  <!-- ── Chat ── -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="chat-footer">
      <div class="chips-row" id="chips"></div>
      <div id="refine-hint" style="display:none"></div>
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="描述你的故事想法…"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Content ── -->
  <div class="content-panel">

    <!-- 项目历史面板（覆盖层） -->
    <div class="history-panel" id="history-panel" style="display:none">
      <div class="history-hdr">
        <h2>项目历史</h2>
        <button class="h-close" onclick="closeHistory()">✕</button>
      </div>
      <div class="history-body">
        <!-- 左：项目列表 -->
        <div class="h-list" id="h-list">
          <div class="h-list-empty">加载中…</div>
        </div>
        <!-- 右：项目详情 -->
        <div class="h-detail">
          <div class="h-detail-hdr" id="h-detail-hdr" style="display:none">
            <div class="h-detail-title" id="h-detail-title"></div>
            <div class="h-detail-sub" id="h-detail-sub"></div>
            <div class="h-detail-actions" id="h-detail-actions"></div>
          </div>
          <div class="h-tabs-row" id="h-tabs-row" style="display:none"></div>
          <div class="h-content" id="h-content">
            <div class="h-empty">← 选择左侧项目查看详情</div>
          </div>
          <div class="h-refine-bar" id="h-refine-bar" style="display:none">
            <textarea id="h-refine-input" rows="2" placeholder="输入修改意见… (Ctrl+Enter 发送)"></textarea>
            <button class="h-refine-btn h-refine-send" onclick="submitHistoryRefine()">发送</button>
            <button class="h-refine-btn h-refine-cancel-btn" onclick="closeHistoryRefine()">取消</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 正常内容区 -->
    <div class="content-toolbar">
      <span class="ctitle" id="ctitle">等待生成…</span>
      <div id="toolbar" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="cbody" id="cbody">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <p>和左侧 AI 描述你的故事想法</p>
        <small>世界观 → 大纲 → 分集剧本，一条龙生成</small>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  主创作流程
// ══════════════════════════════════════════════════════════════════

const S = {
  phase:'chat', projectId:null,
  messages:[], requirements:'', worldbuilding:'', outline:'',
  episodeCount:15, episodes:{}, generating:false,
  pendingAction:null,
};

// ── Router ──────────────────────────────────────────────────────────────────

function goto(hash) {
  location.hash = hash;
}

function showHomeView() {
  $('home-view').style.display      = 'flex';
  document.querySelector('.layout').style.display = 'none';
  $('step-bar').style.display       = 'none';
  $('back-home-btn').style.display  = 'none';
  $('history-btn').style.display    = 'none';
  $('new-proj-btn').style.display   = '';
}

function showCreationView() {
  $('home-view').style.display      = 'none';
  document.querySelector('.layout').style.display = 'flex';
  $('step-bar').style.display       = '';
  $('back-home-btn').style.display  = '';
  $('history-btn').style.display    = '';
  $('new-proj-btn').style.display   = 'none';
}

async function router() {
  const hash = location.hash || '#/';
  if (hash === '#/' || hash === '') {
    showHomeView();
    await loadHome();
  } else if (hash === '#/project/new') {
    showCreationView();
    initNewProject();
  } else if (hash.startsWith('#/project/')) {
    const pid = hash.replace('#/project/', '');
    showCreationView();
    await loadProject(pid);
  }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);

// ── Creation Page Init ───────────────────────────────────────────────────────

function initNewProject() {
  Object.assign(S, {
    phase:'chat', projectId:null, messages:[], requirements:'',
    worldbuilding:'', outline:'', episodeCount:15, episodes:{},
    generating:false, pendingAction:null,
  });
  $('messages').innerHTML = '';
  $('cbody').innerHTML = `
    <div class="empty-state">

// ── SSE ──
async function streamPost(url, body, onChunk) {
  const resp = await fetch(url,{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf='', full='';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    buf += dec.decode(value,{stream:true});
    const lines = buf.split('\n'); buf = lines.pop();
    for(const line of lines) {
      if(!line.startsWith('data: ')) continue;
      const d = JSON.parse(line.slice(6));
      if(d.type==='chunk') { onChunk(d.text); full+=d.text; }
      if(d.type==='done') full=d.full;
    }
  }
  return full;
}

// ── 统一发送 ──
async function handleSend() {
  const text=$input().value.trim();
  if(!text||S.generating) return;
  $input().value=''; $input().style.height='auto';
  if(S.pendingAction) {
    const a=S.pendingAction; cancelRefine(); appendMsg('user',text);
    if(a.type==='episode') await doRefineEpisode(a.num,text);
    else await doRefineContent(a.type,text);
    return;
  }
  appendMsg('user',text);
  S.messages.push({role:'user',content:text});
  setLoading(true); setChips([]);
  if (S.messages.length === 1 && !S.projectId) {
    const tempTitle = text.replace(/\s+/g,'').slice(0,20) || '新故事';
    try {
      const r = await fetch('/api/project',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title:tempTitle, phase:'chat', messages:S.messages}),
      });
      const {id} = await r.json();
      S.projectId = id;
      history.replaceState(null,'',`#/project/${id}`);
    } catch { /* saveProject will handle it later */ }
  }
  const b=appendStreamMsg('assistant'); let full='',started=false;
  try {
    full=await streamPost('/api/chat',{messages:S.messages},chunk=>{
      if(!started){b.innerHTML='';started=true;}
      b.textContent+=chunk; $('messages').scrollTop=$('messages').scrollHeight;
    });
  } catch { b.textContent='网络错误，请重试'; setLoading(false); return; }
  b.textContent=full.replace(/\n?READY\s*$/,'').trim();
  S.messages.push({role:'assistant',content:full});
  setLoading(false);
  if(full.includes('READY')) showReadyChips();
}

  card.innerHTML=`

function refreshEpCard(num) { const o=$(`ep-${num}`); if(o) o.replaceWith(makeEpCard(num)); }

async function generateEpisode(num) {
  if(S.generating) return;
  const card=$(`ep-${num}`);
  if(card){card.className='ep-card generating';card.querySelector('.ep-card-title').textContent='生成中…';}
  showEpContent(num,'',true); setLoading(true);
  const r=$('main-render'); let raw='';
  try {
    raw=await streamPost('/api/episode',{outline:S.outline,episode_num:num},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch {
    if(card){card.className='ep-card';card.querySelector('.ep-card-title').textContent='失败，点击重试';}
    setLoading(false); return;
  }
  r.innerHTML=md(raw); S.episodes[num]=raw; setLoading(false);
  refreshEpCard(num); $('ctitle').textContent=`第 ${num} 集 · 完成`;
  setToolbar([
    {label:`修改第 ${num} 集`,fn:()=>requestRefineEpisode(num)},
    {label:'← 返回列表',fn:backToGrid},
    {label:'导出剧本文件',fn:exportProject},

async function doRefineEpisode(num, feedback) {
  const orig=S.episodes[num]||'';
  showEpContent(num,'',true); setLoading(true);
  const r=$('main-render'); let raw='';
  try {
    raw=await streamPost('/api/refine',{content:orig,feedback},c=>{

      $('cbody').scrollTop=$('cbody').scrollHeight;

  } catch { r.textContent='修改失败'; setLoading(false); return; }
  r.innerHTML=md(raw); S.episodes[num]=raw;
  $('ctitle').textContent=`第 ${num} 集 · 已修改`; setLoading(false);
  refreshEpCard(num); saveProject();
  setToolbar([
    {label:`继续修改第 ${num} 集`,fn:()=>requestRefineEpisode(num)},
    {label:'← 返回列表',fn:backToGrid},
    {label:'导出剧本文件',fn:exportProject},
  ]);
  appendMsg('assistant',`第 ${num} 集修改完成 ✓`);

async function doRefineContent(target, feedback) {
  const orig=target==='worldbuilding'?S.worldbuilding:S.outline;
  const label=target==='worldbuilding'?'世界观':'大纲';
  $('ctitle').textContent=`${label} · 修改中`;
  $('cbody').innerHTML='<div class="rendered" id="main-render"></div>';
  const r=$('main-render'); setLoading(true); let raw='';
  try {
    raw=await streamPost('/api/refine',{content:orig,feedback},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch { r.textContent='修改失败'; setLoading(false); return; }
  r.innerHTML=md(raw); setLoading(false);
  if(target==='worldbuilding') {
    S.worldbuilding=raw; $('ctitle').textContent='世界观设定 · 已修改';
    showWorldbuildingActions(); appendMsg('assistant','世界观已更新 ✓');
  } else {
    S.outline=raw; $('ctitle').textContent='故事大纲 · 已修改';
    showOutlineActions(); appendMsg('assistant','大纲已更新 ✓');
  }
  saveProject();
}

// ── Steps ──
function setStep(n) {
  S.phase=['chat','worldbuilding','outline','episodes'][n-1];
  ['s1','s2','s3','s4'].forEach((id,i)=>{
    $(id).className='step'+(i+1<n?' done':i+1===n?' active':'');
  });
  // 已完成的步骤可点击跳回
  $('s2').onclick = S.worldbuilding ? backToWorldbuilding : null;
  $('s3').onclick = S.outline        ? backToOutline       : null;
  $('s4').onclick = S.outline && (S.phase==='episodes'||Object.keys(S.episodes).length) ? backToEpisodes : null;
}

function backToEpisodes() {
  setStep(4);
  $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
  renderEpisodeGrid();
  setToolbar([
    {label:'全部自动生成',fn:generateAll},
    {label:'导出剧本文件',fn:exportProject},
    {label:'← 修改大纲',fn:backToOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
}

// ── Project 存档 ──
function extractTitle(outline) {
  const m=outline.match(/《(.+?)》/); return m?m[1]:'';
}
async function saveProject() {
  const title=extractTitle(S.outline)||S.requirements.slice(0,20)||'新故事';
  try {
    const resp=await fetch('/api/project',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id:S.projectId, title, phase:S.phase, messages:S.messages,
        requirements:S.requirements, worldbuilding:S.worldbuilding,
        outline:S.outline, episodeCount:S.episodeCount, episodes:S.episodes,
      })});
    const {id}=await resp.json(); S.projectId=id;
  } catch{ /* 静默失败 */ }
}

async function exportProject() {
  if(!S.projectId) { appendMsg('system','请先生成内容'); return; }
  try {
    const r=await fetch(`/api/export/${S.projectId}`,{method:'POST'});
    const {path}=await r.json();
    appendMsg('assistant',`剧本已导出！\n📁 ${path}`);
  } catch { appendMsg('system','导出失败'); }
}

// ── 恢复项目 ──
function restoreProject(data) {
  S.projectId=data.id; S.phase=data.phase||'chat';
  S.messages=data.messages||[]; S.requirements=data.requirements||'';
  S.worldbuilding=data.worldbuilding||''; S.outline=data.outline||'';
  S.episodeCount=data.episodeCount||15; S.episodes=data.episodes||{};

  $('messages').innerHTML='';
  S.messages.forEach(m=>{
    const text=m.content.replace(/\n?READY\s*$/,'').trim();
    if(text) appendMsg(m.role,text);
  });

  const phase=data.phase;
  if(phase==='episodes') {
    setStep(4); $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
    renderEpisodeGrid();
    setToolbar([{label:'全部自动生成',fn:generateAll},{label:'导出剧本文件',fn:exportProject}]);
    setChips([]);
  } else if(phase==='outline') {
    setStep(3); $('ctitle').textContent=`故事大纲 · ${S.episodeCount} 集`;
    $('cbody').innerHTML=`<div class="rendered">${md(S.outline)}</div>`;
    showOutlineActions();
  } else if(phase==='worldbuilding') {
    setStep(2); $('ctitle').textContent='世界观设定';
    $('cbody').innerHTML=`<div class="rendered">${md(S.worldbuilding)}</div>`;
    showWorldbuildingActions();
  } else {
    setStep(1); setChips([]);
  }
  closeHistory();
  appendMsg('assistant',`已恢复项目「${data.title}」，可从上次进度继续创作。`);
}

// ══════════════════════════════════════════════════════════════════
//  项目历史面板
// ══════════════════════════════════════════════════════════════════

const H = {
  open:false,
  project:null,          // 当前加载的完整项目数据
  section:null,          // 'worldbuilding'|'outline'|{type:'episode',num:N}
  sectionContent:'',     // 当前 section 原始内容（用于 refine）
};

async function toggleHistory() {
  if(H.open) { closeHistory(); return; }
  H.open=true; $('history-btn').classList.add('active');
  $('history-panel').style.display='flex';
  await loadProjectList();
}
function closeHistory() {
  H.open=false; $('history-btn').classList.remove('active');
  $('history-panel').style.display='none';
  closeHistoryRefine();
}

async function loadProjectList() {
  $('h-list').innerHTML='<div class="h-list-empty">加载中…</div>';
  try {
    const resp=await fetch('/api/projects');
    const list=await resp.json();
    renderProjectList(list);
  } catch {
    $('h-list').innerHTML='<div class="h-list-empty">加载失败</div>';
  }
}

const phaseLabel={chat:'① 聊需求',worldbuilding:'② 世界观',outline:'③ 大纲',episodes:'④ 剧本'};

function renderProjectList(list) {
  const el=$('h-list');
  if(!list.length) {
    el.innerHTML='<div class="h-list-empty">还没有项目记录<br><small>创作一个剧本后会自动出现在这里</small></div>';
    return;
  }
  el.innerHTML='';
  list.forEach(p=>{
    const card=document.createElement('div');
    card.className='proj-card';
    const progress=p.phase==='episodes'&&p.episodeCount
      ?`${p.episodesDone}/${p.episodeCount} 集`:'';
    card.innerHTML=`
      <div class="proj-title">《${p.title}》</div>
      <div class="proj-meta">
        <span class="phase-badge ${p.phase}">${phaseLabel[p.phase]||p.phase}</span>
        ${progress?`<span class="proj-progress">${progress}</span>`:''}
        <span class="proj-time">${p.updated||''}</span>
      </div>`;
    card.onclick=()=>openProject(p.id, card);
    el.appendChild(card);
  });
}

async function openProject(pid, cardEl) {
  document.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('selected'));
  cardEl.classList.add('selected');
  $('h-detail-hdr').style.display='none';
  $('h-tabs-row').style.display='none';
  $('h-content').innerHTML='<div class="h-empty">加载中…</div>';
  closeHistoryRefine();
  H.project=null; H.section=null;

  try {
    const resp=await fetch(`/api/project/${pid}`);
    const data=await resp.json();
    H.project=data;
    renderProjectDetail(data);
  } catch {
    $('h-content').innerHTML='<div class="h-empty">加载失败</div>';
  }
}

function renderProjectDetail(data) {
  // Header
  const hdr=$('h-detail-hdr');
  hdr.style.display='block';
  $('h-detail-title').textContent=`《${data.title}》`;
  const progress=data.phase==='episodes'&&data.episodeCount
    ?` · ${data.episodesDone}/${data.episodeCount} 集已完成`:' ';
  $('h-detail-sub').textContent=
    `${phaseLabel[data.phase]||data.phase}${progress} · 更新于 ${data.updated||'—'}`;

  // Actions
  const actions=$('h-detail-actions');
  actions.innerHTML='';
  const btnResume=document.createElement('button');
  btnResume.className='chip primary';
  btnResume.textContent='恢复此项目创作';
  btnResume.onclick=()=>{
    if(confirm('恢复此项目将替换当前工作区，确认继续？')) restoreProject(data);
  };
  actions.appendChild(btnResume);

  if(data.episodesDone>0) {
    const btnExport=document.createElement('button');
    btnExport.className='chip';
    btnExport.textContent='导出剧本文件';
    btnExport.onclick=async()=>{
      try {
        const r=await fetch(`/api/export/${data.id}`,{method:'POST'});
        const {path}=await r.json();
        alert(`已导出：${path}`);
      } catch { alert('导出失败'); }
    };
    actions.appendChild(btnExport);
  }

  // 内容标签
  renderContentTabs(data);
}

function renderContentTabs(data) {
  const row=$('h-tabs-row');
  row.style.display='flex'; row.innerHTML='';

  function addTab(label, section, hasDone) {
    const btn=document.createElement('button');
    btn.className='ctab'+(hasDone?' done':'');
    btn.textContent=label;
    btn.onclick=()=>selectSection(section, btn);
    if(!hasDone) btn.disabled=true;
    row.appendChild(btn);
  }

  addTab('世界观','worldbuilding',!!data.worldbuilding);
  addTab('大纲','outline',!!data.outline);

  for(let i=1;i<=data.episodeCount;i++) {
    const done=!!data.episodes?.[String(i)];
    addTab(`第${i}集`,{type:'episode',num:i},done);
  }

  // 默认选第一个有内容的 tab
  const first=row.querySelector('.ctab:not([disabled])');
  if(first) first.click();
}

function selectSection(section, btnEl) {
  document.querySelectorAll('#h-tabs-row .ctab').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
  H.section=section;
  closeHistoryRefine();

  const data=H.project;
  let content='';
  if(section==='worldbuilding') content=data.worldbuilding||'';
  else if(section==='outline') content=data.outline||'';
  else content=data.episodes?.[String(section.num)]||'';

  H.sectionContent=content;
  $('h-content').innerHTML=`<div class="rendered">${md(content)}</div>`;

  // 只要有内容就可修改
  if(content) {
    const editBtn=document.createElement('button');
    editBtn.className='chip'; editBtn.style.cssText='margin:14px 0 0;display:block';
    editBtn.textContent='✏️ 修改此内容';
    editBtn.onclick=openHistoryRefine;
    $('h-content').appendChild(editBtn);
  }
}

// ── 历史修改 ──
function openHistoryRefine() {
  $('h-refine-bar').style.display='flex';
  $('h-refine-input').focus();
}
function closeHistoryRefine() {
  $('h-refine-bar').style.display='none';
  $('h-refine-input').value='';
}

$('h-refine-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();submitHistoryRefine();}
});

async function submitHistoryRefine() {
  const feedback=$('h-refine-input').value.trim();
  if(!feedback||!H.project||!H.section) return;
  $('h-refine-input').value=''; closeHistoryRefine();
  $('h-content').innerHTML='<div class="rendered" id="h-render"></div>';
  const r=$('h-render');

  let raw='';
  try {
    raw=await streamPost('/api/refine',{content:H.sectionContent,feedback},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('h-content').scrollTop=$('h-content').scrollHeight;
    });
  } catch { r.innerHTML='<div class="h-empty">修改失败</div>'; return; }

  r.innerHTML=md(raw);
  H.sectionContent=raw;

  // 局部更新项目
  const pid=H.project.id;
  let patchBody;
  if(H.section==='worldbuilding')     patchBody={field:'worldbuilding',content:raw};
  else if(H.section==='outline')      patchBody={field:'outline',content:raw};
  else patchBody={field:'episode',num:H.section.num,content:raw};

  try {
    await fetch(`/api/project/${pid}`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(patchBody)});
    // 更新本地缓存
    if(H.section==='worldbuilding')    H.project.worldbuilding=raw;
    else if(H.section==='outline')     H.project.outline=raw;
    else { H.project.episodes=H.project.episodes||{}; H.project.episodes[String(H.section.num)]=raw; }

    const saveOk=document.createElement('p');
    saveOk.style.cssText='font-size:11px;color:#4a8a4a;margin-top:10px';
    saveOk.textContent='✓ 已保存到项目';
    r.appendChild(saveOk);

    const editBtn=document.createElement('button');
    editBtn.className='chip'; editBtn.style.cssText='margin-top:10px;display:inline-block';
    editBtn.textContent='继续修改'; editBtn.onclick=openHistoryRefine;
    r.appendChild(editBtn);

    // 世界观修改后：提供重新生成大纲
    if(H.section==='worldbuilding' && H.project.requirements) {
      const regenBtn=document.createElement('button');
      regenBtn.className='chip primary'; regenBtn.style.cssText='margin-top:10px;margin-left:6px;display:inline-block';
      regenBtn.textContent='→ 重新生成大纲'; regenBtn.onclick=historyRegenOutline;
      r.appendChild(regenBtn);
    }
    // 大纲修改后：提供重新生成某集
    if(H.section==='outline') {
      const regenBtn=document.createElement('button');
      regenBtn.className='chip primary'; regenBtn.style.cssText='margin-top:10px;margin-left:6px;display:inline-block';
      regenBtn.textContent='→ 重新生成剧本集'; regenBtn.onclick=()=>showHistoryEpPicker();
      r.appendChild(regenBtn);
    }
  } catch {
    const fail=document.createElement('p');
    fail.style.cssText='font-size:11px;color:#8a4a4a;margin-top:10px';
    fail.textContent='⚠ 保存失败';
    r.appendChild(fail);
  }
}

// ── 历史面板：重新生成大纲 ──
async function historyRegenOutline() {
  if(!H.project) return;
  $('h-content').innerHTML='<div class="rendered" id="h-render"></div>';
  const r=$('h-render');
  r.innerHTML='<p style="color:#777;font-size:13px">正在重新生成大纲…<span class="typing-cursor"></span></p>';

  let raw='', started=false;
  try {
    raw=await streamPost('/api/outline',{
      requirements:H.project.requirements||'',
      worldbuilding:H.project.worldbuilding||'',
      episode_count:H.project.episodeCount||15,
    },c=>{
      if(!started){r.innerHTML='';started=true;}
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('h-content').scrollTop=$('h-content').scrollHeight;
    });
  } catch { r.innerHTML='<div class="h-empty">生成失败</div>'; return; }

  r.innerHTML=md(raw);
  H.project.outline=raw; H.sectionContent=raw;
  try {
    await fetch(`/api/project/${H.project.id}`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({field:'outline',content:raw})});
    const ok=document.createElement('p');
    ok.style.cssText='font-size:11px;color:#4a8a4a;margin-top:10px';
    ok.textContent='✓ 大纲已重新生成并保存';
    r.appendChild(ok);
  } catch {}
}

// ── 历史面板：选集重新生成 ──
function showHistoryEpPicker() {
  const count=H.project.episodeCount||15;
  $('h-content').innerHTML='<div style="padding:16px"><p style="font-size:13px;color:#aaa;margin-bottom:10px">选择要重新生成的集数：</p><div id="h-ep-picker" style="display:flex;flex-wrap:wrap;gap:7px"></div></div>';
  const picker=$('h-ep-picker');
  for(let i=1;i<=count;i++) {
    const btn=document.createElement('button');
    btn.className='chip'; btn.textContent=`第${i}集`;
    btn.onclick=()=>historyRegenEpisode(i);
    picker.appendChild(btn);
  }
}

async function historyRegenEpisode(num) {
  if(!H.project) return;
  $('h-content').innerHTML='<div class="rendered" id="h-render"></div>';
  const r=$('h-render');
  r.innerHTML=`<p style="color:#777;font-size:13px">正在重新生成第 ${num} 集…<span class="typing-cursor"></span></p>`;

  const ol=H.project.outline||'';
  let raw='', started=false;
  try {
    raw=await streamPost('/api/episode',{
      outline:ol, episode_num:num,
    },c=>{
      if(!started){r.innerHTML='';started=true;}
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('h-content').scrollTop=$('h-content').scrollHeight;
    });
  } catch { r.innerHTML='<div class="h-empty">生成失败</div>'; return; }

  r.innerHTML=md(raw);
  H.project.episodes=H.project.episodes||{};
  H.project.episodes[String(num)]=raw;
  try {
    await fetch(`/api/project/${H.project.id}`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({field:'episode',num,content:raw})});
    const ok=document.createElement('p');
    ok.style.cssText='font-size:11px;color:#4a8a4a;margin-top:10px';
    ok.textContent=`✓ 第 ${num} 集已重新生成并保存`;
    r.appendChild(ok);
    const more=document.createElement('button');
    more.className='chip'; more.style.cssText='margin-top:8px;display:block';
    more.textContent='继续选集'; more.onclick=showHistoryEpPicker;
    r.appendChild(more);
  } catch {}
}

function extractEpOutlinesFromText(outline) {
  const pattern=/\*\*第(\d+)集[^*]*\*\*/g;
  const parts=outline.split(pattern);
  const result=[];
  for(let i=1;i<parts.length;i+=2) result.push(`第${parts[i]}集 ${parts[i+1]||''}`);
  return result;
}

// ══════════════════════════════════════════════════════════════════
//  Markdown renderer
// ══════════════════════════════════════════════════════════════════
function md(t) {
  if(!t) return '';
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^\|(.+)\|$/gm,(_,row)=>{
      const cells=row.split('|').map(c=>c.trim());
      return '<tr>'+cells.map(c=>`<td>${c}</td>`).join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g,m=>{
      const rows=m.trim().split('\n');
      const head=rows[0].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');
      const body=rows.slice(1).filter(r=>!r.includes('---')).join('\n');
      return `<table>${head}${body}</table>`;
    })
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/「([^」]+)」/g,'「<em>$1</em>」')
    .replace(/\n{2,}/g,'\n')
    .split('\n').map(line=>{
      if(/^<(h[1-3]|hr|table|blockquote|tr|th|td)/.test(line)) return line;
      return line?`<p>${line}</p>`:'';
    }).join('');
}
