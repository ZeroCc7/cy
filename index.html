<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>短视频剧本生成器</title>
<script>(function(){var t=localStorage.getItem('cy-theme')||'dark';document.documentElement.dataset.theme=t;}());</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* ── Design Tokens ─────────────────────────────────────────────── */
:root{
  /* Neutral warm charcoal — no purple/blue cast, pairs cleanly with gold */
  --bg:       #0c0b09;
  --surf-1:   #151310;
  --surf-2:   #1e1b17;
  --surf-3:   #272420;
  --surf-4:   #33302a;
  --line-1:   #201d18;
  --line-2:   #2c2822;
  --line-3:   #3e3830;
  /* Amber-gold — brighter, cleaner, no green cast */
  --gold:     #e8b44e;
  --gold-lt:  #f4c96a;
  --gold-dim: #e8b44e30;
  --gold-faint:#e8b44e0e;
  /* Warm neutral text hierarchy */
  --txt-1:    #f4ede0;
  --txt-2:    #a09080;
  --txt-3:    #5e5448;
  --txt-4:    #322c24;
  --danger:   #c06060;
  --safe:     #5ea870;
  --blue:     #5878b8;
  --r-xs:5px;--r-sm:9px;--r-md:13px;--r-lg:18px;
}
/* ── Light Theme ────────────────────────────────────────────────── */
[data-theme="light"]{
  /* Warm parchment surfaces — no purple cast, mirrors dark's warmth */
  --bg:        #ede8df;
  --surf-1:    #f8f4ed;
  --surf-2:    #ede8df;
  --surf-3:    #e2dccf;
  --surf-4:    #d4ccbc;
  --line-1:    #e2dcd0;
  --line-2:    #cfc8b8;
  --line-3:    #b8ae9e;
  /* Deep amber — readable as text on light surfaces */
  --gold:      #9a6a00;
  --gold-lt:   #b07e14;
  --gold-dim:  #9a6a0030;
  --gold-faint:#9a6a000e;
  /* Dark warm text hierarchy */
  --txt-1:     #1c1710;
  --txt-2:     #564838;
  --txt-3:     #8a7868;
  --txt-4:     #c0b09c;
  --danger:    #a83030;
  --safe:      #2e7040;
  --blue:      #2858a0;
}
/* CTA buttons carry gold bg — need light text in light mode for contrast */
[data-theme="light"] .primary-hdr-btn,
[data-theme="light"] .char-panel-extract-btn,
[data-theme="light"] .gen-confirm-btn {
  color: #fef5e0;
}
/* ctab done+active: hardcoded dark green bg needs light override */
[data-theme="light"] .ctab.done.active{
  background:color-mix(in srgb,var(--safe) 18%,transparent);
  border-color:color-mix(in srgb,var(--safe) 50%,transparent);
  color:var(--safe)
}

/* ── Theme Toggle Button ─────────────────────────────────────────── */
.theme-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid var(--line-2);border-radius:var(--r-xs);
  color:var(--txt-2);cursor:pointer;transition:all .18s;flex-shrink:0
}
.theme-btn:hover{background:var(--surf-3);color:var(--txt-1);border-color:var(--line-3)}

/* ── Reset & Base ───────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Outfit","PingFang SC","Hiragino Sans GB","Microsoft YaHei UI","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--txt-1);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  font-size:14px;-webkit-font-smoothing:antialiased
}

/* ── Header ─────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;gap:10px;padding:0 20px;height:52px;
  background:var(--surf-1);border-bottom:1px solid var(--line-2);
  flex-shrink:0;position:relative;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)
}
header h1{
  font-size:14px;font-weight:600;color:var(--gold);letter-spacing:.08em;
  white-space:nowrap;display:flex;align-items:center;gap:6px
}
header h1::before{
  content:'';display:inline-block;width:3px;height:14px;
  background:var(--gold);border-radius:2px;opacity:.8
}

/* Step bar */
/* Step bar */
.step-bar{display:flex;gap:0;margin-left:auto;align-items:center;
  background:var(--surf-2);border:1px solid var(--line-2);
  border-radius:20px;padding:3px;flex-shrink:0}
.step{
  padding:3px 11px;border-radius:16px;font-size:11px;font-weight:500;
  color:var(--txt-4);transition:all .2s;white-space:nowrap;
  letter-spacing:.03em;cursor:default;border:1px solid transparent
}
.step.active{
  background:var(--gold-dim);border-color:var(--gold);
  color:var(--gold);font-weight:600
}
.step.done{
  background:color-mix(in srgb,var(--safe) 10%,transparent);
  border-color:color-mix(in srgb,var(--safe) 28%,transparent);
  color:var(--safe);cursor:pointer;font-weight:500
}
.step.done:hover{
  background:color-mix(in srgb,var(--safe) 18%,transparent);
  border-color:color-mix(in srgb,var(--safe) 55%,transparent);
  color:color-mix(in srgb,var(--safe) 140%,white)
}
.step-arrow{color:var(--line-3);font-size:9px}

/* Header button groups */
.hdr-actions{display:flex;align-items:center;gap:5px;margin-left:14px;flex-shrink:0}
.hdr-divider{width:1px;height:18px;background:var(--line-3);margin:0 3px;flex-shrink:0}

/* Back / ghost — minimal, only used for ← 首页 */
.hdr-btn{
  display:flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:var(--r-sm);border:1px solid var(--line-2);
  background:var(--surf-2);color:var(--txt-1);
  font-size:12px;font-family:inherit;cursor:pointer;
  transition:all .18s;white-space:nowrap;opacity:.75
}
.hdr-btn:hover{opacity:1;border-color:var(--line-3);background:var(--surf-3)}
.hdr-btn.active{opacity:1;background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)}

/* Secondary — clearly a button, no gold yet */
.hdr-btn-outline{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:var(--r-sm);border:1px solid var(--line-3);
  background:var(--surf-2);color:var(--txt-1);
  font-size:12px;font-family:inherit;cursor:pointer;transition:all .18s;white-space:nowrap
}
.hdr-btn-outline:hover{
  background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)
}
.hdr-btn-outline.active{
  background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)
}

/* Primary solid */
.primary-hdr-btn{
  display:flex;align-items:center;gap:5px;padding:5px 14px;
  border-radius:var(--r-sm);border:none;
  background:var(--gold);color:#0e0a02;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:all .18s;white-space:nowrap
}
.primary-hdr-btn:hover{background:var(--gold-lt);box-shadow:0 2px 12px #c8a95e40}

/* Character button — always gold-tinted so it stands out */
.hdr-char-btn{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:var(--r-sm);
  border:1px solid var(--gold-dim);
  background:var(--gold-faint);
  color:var(--gold);
  font-size:12px;font-family:inherit;cursor:pointer;transition:all .18s;white-space:nowrap
}
.hdr-char-btn:hover{
  background:var(--gold-dim);border-color:var(--gold);
  box-shadow:0 0 10px var(--gold-faint)
}
.hdr-char-btn.has-chars{
  background:var(--gold-dim);border-color:var(--gold)
}
.char-count-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:17px;height:17px;padding:0 4px;border-radius:10px;
  background:var(--gold);color:#0e0a02;font-size:10px;font-weight:700;
  line-height:1;transition:all .2s
}
.hdr-char-btn:not(.has-chars) .char-count-badge{display:none}

/* ── Layout ─────────────────────────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Chat-focus: full-screen conversation mode ───────────────────── */
.layout.chat-focus{justify-content:center;background:var(--bg)}
.layout.chat-focus .chat-panel{
  width:100%;max-width:760px;border-right:none;background:transparent
}
.layout.chat-focus .content-panel{display:none}

/* Messages: more breathing room */
.layout.chat-focus .messages{
  padding:36px 52px;gap:22px
}
.layout.chat-focus .msg{max-width:78%}
.layout.chat-focus .bubble{
  font-size:14.5px;padding:12px 17px;line-height:1.82
}
.layout.chat-focus .msg.assistant .bubble{
  background:var(--surf-1);border-color:var(--line-2)
}

/* Composer input box — borderless textarea inside a styled container */
.layout.chat-focus .chat-footer{
  padding:0 44px 32px;border-top:none;background:transparent;gap:10px
}
.layout.chat-focus .chips-row{padding:0 4px}
.layout.chat-focus .input-row{
  background:var(--surf-1);border:1px solid var(--line-3);
  border-radius:18px;padding:10px 10px 10px 18px;
  box-shadow:0 4px 24px #00000055;
  transition:border-color .2s,box-shadow .2s;align-items:flex-end
}
.layout.chat-focus .input-row:focus-within{
  border-color:color-mix(in srgb,var(--gold) 40%,transparent);
  box-shadow:0 4px 24px #00000055,0 0 0 3px var(--gold-faint)
}
.layout.chat-focus .input-row textarea{
  border:none;background:transparent;
  box-shadow:none;min-height:60px;padding:4px 0;font-size:14.5px
}
.layout.chat-focus .input-row textarea:focus{
  border:none;box-shadow:none
}
.layout.chat-focus .send-btn{
  width:42px;height:42px;border-radius:13px;flex-shrink:0
}

/* ── Chat Panel ─────────────────────────────────────────────────── */
.chat-panel{
  display:flex;flex-direction:column;width:390px;flex-shrink:0;
  border-right:1px solid var(--line-1);background:var(--surf-1)
}
.messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth
}
.messages::-webkit-scrollbar{width:2px}
.messages::-webkit-scrollbar-thumb{background:var(--line-3);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:88%;gap:4px}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-lbl{font-size:10.5px;color:var(--txt-4);padding:0 5px;letter-spacing:.04em}
.msg.user .msg-lbl{text-align:right;color:color-mix(in srgb,var(--gold) 40%,transparent)}
.bubble{
  padding:9px 14px;border-radius:var(--r-md);font-size:13.5px;
  line-height:1.75;white-space:pre-wrap;word-break:break-word
}
.msg.user .bubble{
  background:linear-gradient(135deg,var(--gold),#b8922a);
  color:#0e0a02;border-bottom-right-radius:3px;
  box-shadow:0 2px 10px #c8a95e28
}
.msg.assistant .bubble{
  background:var(--surf-2);color:var(--txt-1);
  border-bottom-left-radius:3px;border:1px solid var(--line-2)
}
.msg.system{align-self:center}
.msg.system .bubble{
  background:none;border:1px dashed var(--line-3);color:var(--txt-3);
  font-size:11.5px;border-radius:var(--r-sm);padding:5px 14px;text-align:center
}

/* Chat footer */
.chat-footer{
  padding:10px 12px 13px;border-top:1px solid var(--line-1);
  background:var(--surf-1);display:flex;flex-direction:column;gap:8px
}
.chips-row{display:flex;flex-wrap:wrap;gap:5px}
.input-row{display:flex;gap:8px;align-items:flex-end}
textarea{
  flex:1;background:var(--surf-2);border:1px solid var(--line-3);
  border-radius:var(--r-md);color:var(--txt-1);font-size:13.5px;
  font-family:inherit;padding:9px 13px;resize:none;outline:none;
  line-height:1.55;min-height:72px;max-height:40vh;
  transition:border-color .2s,box-shadow .2s
}
textarea:focus{border-color:color-mix(in srgb,var(--gold) 35%,transparent);
  box-shadow:0 0 0 3px var(--gold-faint)}
textarea::placeholder{color:var(--txt-4)}
textarea:disabled{opacity:.35}
.send-btn{
  background:var(--gold);color:#0e0a02;border:none;border-radius:var(--r-sm);
  width:38px;height:38px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .15s;
  box-shadow:0 2px 8px #c8a95e30
}
.send-btn:hover{background:var(--gold-lt);box-shadow:0 4px 14px #c8a95e40}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{background:var(--surf-3);color:var(--txt-4);cursor:not-allowed;box-shadow:none}
.send-btn svg{width:14px;height:14px}

/* Chips */
.chip{
  padding:4px 13px;border-radius:20px;font-size:12px;font-family:inherit;
  border:1px solid var(--line-3);background:var(--surf-2);
  color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap
}
.chip:hover{background:var(--gold-faint);border-color:color-mix(in srgb,var(--gold) 50%,transparent)}
.chip:disabled{opacity:.35;cursor:not-allowed}
.chip.primary{
  background:var(--gold);color:#0e0a02;border-color:var(--gold);
  font-weight:600;box-shadow:0 1px 6px #c8a95e28
}
.chip.primary:hover{background:var(--gold-lt)}
.num-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.num-row label{font-size:12px;color:var(--txt-2)}
.num-input{
  width:56px;background:var(--surf-2);border:1px solid var(--line-3);
  border-radius:var(--r-xs);color:var(--txt-1);font-size:13px;
  font-family:inherit;padding:4px 8px;outline:none;text-align:center
}
.num-input:focus{border-color:var(--gold-dim)}
.refine-hint{
  background:color-mix(in srgb,var(--gold) 6%,var(--surf-1));
  border:1px solid var(--gold-dim);border-radius:var(--r-sm);
  padding:7px 12px;font-size:12px;color:color-mix(in srgb,var(--gold) 70%,transparent);
  display:flex;align-items:center;justify-content:space-between
}
.refine-cancel{cursor:pointer;color:var(--txt-3);font-size:11px}
.refine-cancel:hover{color:var(--txt-2)}

/* ── Content Panel ──────────────────────────────────────────────── */
.content-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.content-toolbar{
  display:flex;align-items:center;gap:7px;padding:8px 22px;
  border-bottom:1px solid var(--line-1);background:var(--surf-1);
  flex-shrink:0;min-height:46px;flex-wrap:wrap
}
.ctitle{font-size:12px;color:var(--txt-3);margin-right:auto;letter-spacing:.03em}
.cbody{flex:1;overflow-y:auto;padding:28px 32px}
.cbody::-webkit-scrollbar{width:2px}
.cbody::-webkit-scrollbar-thumb{background:var(--line-3);border-radius:2px}

/* ── Markdown ───────────────────────────────────────────────────── */
.rendered{font-size:14px;line-height:1.9;color:color-mix(in srgb,var(--txt-1) 85%,transparent);max-width:860px}
.rendered h1{
  color:var(--gold);font-size:19px;margin-bottom:14px;
  border-bottom:1px solid var(--gold-faint);padding-bottom:8px;
  letter-spacing:.04em
}
.rendered h2{color:color-mix(in srgb,var(--gold) 75%,white);font-size:15.5px;margin:22px 0 9px}
.rendered h3{color:color-mix(in srgb,var(--gold) 55%,var(--txt-2));font-size:14px;margin:15px 0 6px}
.rendered p{margin-bottom:9px}
.rendered strong{color:var(--txt-1)}
.rendered em{color:color-mix(in srgb,var(--gold) 60%,var(--txt-2));font-style:normal}
.rendered hr{border:none;border-top:1px solid var(--line-2);margin:16px 0}
.rendered blockquote{
  border-left:3px solid var(--gold-dim);padding:6px 14px;
  color:var(--txt-2);margin:8px 0;background:var(--gold-faint);
  border-radius:0 var(--r-xs) var(--r-xs) 0;font-style:italic
}
.rendered code{
  background:var(--surf-3);padding:2px 6px;border-radius:var(--r-xs);
  font-family:ui-monospace,monospace;font-size:12px;color:var(--gold)
}
.rendered table{border-collapse:collapse;width:100%;margin:12px 0}
.rendered th{
  background:var(--surf-3);color:var(--gold);padding:7px 13px;
  border:1px solid var(--line-3);font-size:12.5px;text-align:left;font-weight:600
}
.rendered td{
  padding:6px 13px;border:1px solid var(--line-2);
  font-size:12.5px;color:var(--txt-2)
}
.rendered tr:nth-child(even) td{background:color-mix(in srgb,var(--surf-2) 50%,transparent)}

/* ── Episode Grid ───────────────────────────────────────────────── */
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.ep-card{
  background:var(--surf-2);border:1px solid var(--line-2);border-radius:var(--r-md);
  padding:13px 14px;cursor:pointer;transition:all .2s
}
.ep-card:hover{border-color:color-mix(in srgb,var(--gold) 35%,transparent);background:var(--surf-3)}
.ep-card.generating{
  border-color:var(--gold);
  animation:pulse .9s ease-in-out infinite alternate;
  box-shadow:0 0 14px var(--gold-faint)
}
.ep-card.done{border-color:#2a5a2a60;background:color-mix(in srgb,#111a11 70%,var(--surf-2));cursor:default}
.ep-card.done:hover{border-color:#3a7a3a80}
@keyframes pulse{from{opacity:.55}to{opacity:1}}
.ep-num{font-size:10.5px;color:var(--txt-3);margin-bottom:5px;letter-spacing:.04em}
.ep-card-title{font-size:13px;color:var(--gold);line-height:1.45}
.ep-card.done .ep-card-title{color:var(--safe)}
.ep-status{font-size:11px;margin-top:6px;color:var(--txt-4)}
.ep-card.done .ep-status{color:color-mix(in srgb,var(--safe) 70%,transparent)}
.ep-actions{display:flex;gap:5px;margin-top:9px}
.ep-action-btn{
  font-size:11px;padding:3px 9px;border-radius:var(--r-xs);
  border:1px solid var(--line-3);background:var(--surf-3);
  color:var(--gold);cursor:pointer;transition:all .15s;font-family:inherit
}
.ep-action-btn:hover{background:var(--gold-faint)}

/* ── Empty State ────────────────────────────────────────────────── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:14px
}
.empty-state svg{width:42px;height:42px;opacity:.15;color:var(--gold)}
.empty-state p{font-size:14px;color:var(--txt-3)}
.empty-state small{font-size:12px;color:var(--txt-4)}

/* Typing cursor */
.typing-cursor{
  display:inline-block;width:2px;height:13px;background:var(--gold);
  border-radius:1px;animation:blink .9s step-end infinite;
  vertical-align:text-bottom;margin-left:1px
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── History / Project Panel ────────────────────────────────────── */
.history-panel{
  position:absolute;inset:0;background:var(--surf-1);
  display:flex;flex-direction:column;z-index:20
}
.history-hdr{
  display:flex;align-items:center;padding:0 18px;
  border-bottom:1px solid var(--line-2);flex-shrink:0;height:50px;gap:12px
}
.history-hdr h2{font-size:14px;color:var(--gold);font-weight:600;letter-spacing:.04em}
.h-close{
  margin-left:auto;background:none;border:none;color:var(--txt-3);
  font-size:15px;cursor:pointer;padding:5px 8px;border-radius:var(--r-xs);
  line-height:1;transition:all .15s;font-family:inherit
}
.h-close:hover{color:var(--txt-1);background:var(--surf-3)}
.history-body{display:flex;flex:1;overflow:hidden}

.h-list{
  width:270px;flex-shrink:0;border-right:1px solid var(--line-1);
  overflow-y:auto;padding:8px 8px;display:flex;flex-direction:column;gap:2px
}
.h-list::-webkit-scrollbar{width:2px}
.h-list::-webkit-scrollbar-thumb{background:var(--line-3)}

.proj-card{
  padding:11px 13px;border-radius:var(--r-sm);cursor:pointer;
  border:1px solid transparent;transition:all .15s
}
.proj-card:hover{background:var(--surf-2);border-color:var(--line-3)}
.proj-card.selected{background:var(--surf-3);border-color:var(--gold-dim)}
.proj-title{
  font-size:13px;color:var(--gold);line-height:1.35;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.proj-meta{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap}
.phase-badge{font-size:10px;padding:1px 8px;border-radius:8px;border:1px solid;white-space:nowrap}
.phase-badge.chat        {color:var(--txt-3);border-color:var(--line-3)}
.phase-badge.worldbuilding{color:#c8904a;border-color:#c8904a30;background:#c8904a0a}
.phase-badge.outline     {color:var(--blue);border-color:#5878b830;background:#5878b80a}
.phase-badge.episodes    {color:var(--safe);border-color:#5ea87030;background:#5ea8700a}
.proj-time{font-size:10px;color:var(--txt-4)}
.proj-progress{font-size:10px;color:#4a6a4a}

.h-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.h-detail-hdr{padding:14px 20px 12px;border-bottom:1px solid var(--line-1);flex-shrink:0}
.h-detail-title{font-size:15px;color:var(--gold);font-weight:600;margin-bottom:4px}
.h-detail-sub{font-size:12px;color:var(--txt-3);margin-bottom:11px}
.h-detail-actions{display:flex;gap:7px;flex-wrap:wrap}

.h-tabs-row{
  display:flex;gap:5px;padding:9px 20px;border-bottom:1px solid var(--line-1);
  flex-shrink:0;overflow-x:auto;flex-wrap:nowrap
}
.h-tabs-row::-webkit-scrollbar{height:2px}
.h-tabs-row::-webkit-scrollbar-thumb{background:var(--line-3)}
.ctab{
  padding:4px 12px;border-radius:20px;font-size:12px;font-family:inherit;
  border:1px solid var(--line-3);background:var(--surf-2);
  color:var(--txt-2);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0
}
.ctab:hover{background:var(--surf-3);color:var(--txt-1)}
.ctab.active{background:var(--gold-dim);border-color:color-mix(in srgb,var(--gold) 50%,transparent);color:var(--gold)}
.ctab.done{border-color:#2a5a2a50;color:var(--safe)}
.ctab.done.active{background:#1a2e1a;border-color:#3a7a3a;color:color-mix(in srgb,var(--safe) 120%,white)}
.ctab:disabled{opacity:.3;cursor:not-allowed}

.h-content{flex:1;overflow-y:auto;padding:22px 24px}
.h-content::-webkit-scrollbar{width:2px}
.h-content::-webkit-scrollbar-thumb{background:var(--line-3)}
.h-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--txt-4);font-size:13px
}

.h-refine-bar{
  border-top:1px solid var(--line-1);padding:10px 14px;
  background:var(--bg);display:flex;gap:8px;align-items:flex-end;flex-shrink:0
}
.h-refine-bar textarea{
  flex:1;background:var(--surf-2);border:1px solid var(--line-3);
  border-radius:var(--r-sm);color:var(--txt-1);font-size:13px;
  font-family:inherit;padding:7px 11px;resize:none;outline:none;max-height:90px
}
.h-refine-bar textarea:focus{border-color:var(--gold-dim)}
.h-refine-btn{
  padding:7px 15px;border-radius:var(--r-sm);border:none;
  font-size:12.5px;font-family:inherit;cursor:pointer;transition:all .15s;flex-shrink:0
}
.h-refine-send{background:var(--gold);color:#0e0a02;font-weight:600}
.h-refine-send:hover{background:var(--gold-lt)}
.h-refine-cancel-btn{background:var(--surf-3);color:var(--txt-2)}
.h-refine-cancel-btn:hover{color:var(--txt-1)}
.h-list-empty{padding:24px 12px;text-align:center;color:var(--txt-4);font-size:12.5px;line-height:1.9}

/* ── Home View ──────────────────────────────────────────────────── */
.home-body{flex:1;overflow-y:auto;padding:32px 36px}
.home-body::-webkit-scrollbar{width:2px}
.home-body::-webkit-scrollbar-thumb{background:var(--line-3)}
.home-section-title{
  font-size:11.5px;font-weight:600;color:var(--txt-3);margin-bottom:16px;
  letter-spacing:.12em;text-transform:uppercase
}
.proj-grid-home{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px
}
.proj-card-home{
  background:var(--surf-2);border:1px solid var(--line-2);
  border-radius:var(--r-lg);padding:18px 20px;cursor:pointer;
  transition:all .22s;position:relative;overflow:hidden
}
.proj-card-home::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
  opacity:0;transition:opacity .3s
}
.proj-card-home:hover{
  border-color:color-mix(in srgb,var(--gold) 30%,transparent);
  background:var(--surf-3);transform:translateY(-1px);
  box-shadow:0 6px 24px #00000060
}
.proj-card-home:hover::before{opacity:1}
.pch-title{
  font-size:14.5px;color:var(--gold);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;
  letter-spacing:.02em
}
.pch-meta{display:flex;gap:7px;align-items:center;margin-bottom:12px}
.pch-progress{font-size:11px;color:var(--safe)}
.pch-footer{display:flex;align-items:center;justify-content:space-between}
.pch-time{font-size:11px;color:var(--txt-4)}
.pch-delete{
  background:none;border:none;color:var(--txt-4);font-size:17px;
  cursor:pointer;padding:2px 6px;border-radius:var(--r-xs);line-height:1;
  transition:all .15s;font-family:inherit
}
.pch-delete:hover{color:var(--danger);background:color-mix(in srgb,var(--danger) 12%,transparent)}
.home-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;gap:14px
}
.home-empty p{font-size:14px;color:var(--txt-3)}
.home-empty small{font-size:12px;color:var(--txt-4)}

/* ── Character Panel ─────────────────────────────────────────── */
.char-panel{
  position:absolute;inset:0;z-index:50;background:var(--surf-1);
  display:flex;flex-direction:column;overflow:hidden
}
.char-panel-hdr{
  display:flex;align-items:center;padding:13px 22px;
  border-bottom:1px solid var(--line-2);flex-shrink:0;gap:10px
}
.char-panel-hdr h2{
  font-size:12px;font-weight:700;color:var(--gold);
  letter-spacing:.1em;text-transform:uppercase;flex:1;margin:0
}
.char-panel-pactions{display:flex;align-items:center;gap:7px}
.char-panel-close{
  background:none;border:none;color:var(--txt-3);font-size:15px;
  cursor:pointer;padding:3px 8px;border-radius:var(--r-xs);
  transition:all .15s;font-family:inherit;line-height:1
}
.char-panel-close:hover{color:var(--txt-1);background:var(--surf-3)}
.char-panel-body{flex:1;overflow-y:auto;padding:24px 28px}
.char-panel-body::-webkit-scrollbar{width:2px}
.char-panel-body::-webkit-scrollbar-thumb{background:var(--line-3);border-radius:2px}
.char-panel-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;height:100%;color:var(--txt-3);text-align:center;padding-bottom:60px
}
.char-panel-empty svg{opacity:.25}
.char-panel-empty p{font-size:14px;color:var(--txt-2);margin:0}
.char-panel-empty small{font-size:12px;color:var(--txt-4);max-width:280px;line-height:1.6}
.char-panel-extract-btn{
  margin-top:6px;padding:9px 24px;border-radius:var(--r-sm);background:var(--gold);
  border:none;color:#1a1208;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit
}
.char-panel-extract-btn:hover{background:var(--gold-lt);box-shadow:0 4px 16px #c8a95e40}
.char-panel-extract-btn:disabled{opacity:.4;cursor:not-allowed}
/* disabled state for char-btn when worldbuilding not ready */
.hdr-char-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.char-add-btn{
  font-size:12px;padding:4px 13px;border-radius:20px;
  border:1px solid var(--line-3);background:transparent;
  color:var(--txt-2);cursor:pointer;transition:all .2s;font-family:inherit
}
.char-add-btn:hover{background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)}
.char-add-btn:disabled{opacity:.4;cursor:not-allowed}
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px
}
.char-card{
  background:var(--surf-2);border:1px solid var(--line-2);
  border-radius:var(--r-md);overflow:hidden;cursor:pointer;
  transition:all .2s;position:relative
}
.char-card:hover{
  border-color:color-mix(in srgb,var(--gold) 35%,transparent);
  background:var(--surf-3);transform:translateY(-2px);
  box-shadow:0 6px 20px #00000060
}
.char-avatar{
  width:100%;aspect-ratio:3/4;background:var(--surf-3);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative
}
.char-generating-overlay{
  position:absolute;inset:0;background:#07070ecc;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:var(--gold);font-size:11px;
  backdrop-filter:blur(2px)
}
@keyframes spin{to{transform:rotate(360deg)}}
.char-spinner{
  width:24px;height:24px;border:2px solid var(--gold-dim);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .75s linear infinite;flex-shrink:0
}
.char-avatar img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.char-modal-avatar img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
.char-avatar-placeholder{
  font-size:30px;color:var(--txt-4);font-weight:700;
  background:linear-gradient(135deg,var(--surf-2),var(--surf-4))
}
.char-info{padding:10px 12px}
.char-name{
  font-size:13px;color:var(--gold);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px
}
.char-role-badge{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid}
.char-role-badge.protagonist{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-faint)}
.char-role-badge.antagonist{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 35%,transparent);background:color-mix(in srgb,var(--danger) 6%,transparent)}
.char-role-badge.supporting{color:var(--txt-3);border-color:var(--line-3);background:transparent}
.char-edit-btn{
  width:100%;padding:6px;border:none;border-top:1px solid var(--line-2);
  background:transparent;color:var(--txt-4);font-size:11.5px;
  cursor:pointer;transition:all .15s;font-family:inherit
}
.char-edit-btn:hover{color:var(--gold);background:var(--gold-faint)}

/* ── Gen Dialog ─────────────────────────────────────────────────── */
.gen-dialog-overlay{
  position:fixed;inset:0;background:#00000098;
  display:flex;align-items:center;justify-content:center;z-index:200;
  backdrop-filter:blur(4px)
}
.gen-dialog{
  background:var(--surf-1);border:1px solid var(--line-3);
  border-radius:var(--r-lg);width:460px;max-width:95vw;
  padding:22px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 20px 60px #00000090
}
.gen-dialog h4{font-size:14px;color:var(--gold);font-weight:600;margin:0;letter-spacing:.04em}
.gen-field label{font-size:11px;font-weight:600;color:var(--txt-3);display:block;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
.gen-field textarea,.gen-field select{
  width:100%;background:var(--surf-2);border:1px solid var(--line-3);
  border-radius:var(--r-sm);color:var(--txt-1);font-size:13px;
  font-family:inherit;padding:9px 11px;outline:none;transition:border-color .2s
}
.gen-field textarea{resize:vertical;min-height:90px;line-height:1.6}
.gen-field textarea:focus,.gen-field select:focus{border-color:var(--gold-dim)}
.gen-field select option{background:var(--surf-1)}
.gen-dialog-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:2px}
.gen-cancel-btn{
  background:none;border:1px solid var(--line-3);color:var(--txt-2);
  padding:7px 16px;border-radius:var(--r-sm);font-size:13px;
  font-family:inherit;cursor:pointer;transition:all .15s
}
.gen-cancel-btn:hover{background:var(--surf-3);color:var(--txt-1)}
.gen-confirm-btn{
  background:var(--gold);color:#0e0a02;border:none;
  font-size:13px;font-weight:700;padding:7px 22px;
  border-radius:var(--r-sm);cursor:pointer;font-family:inherit;
  transition:all .15s;box-shadow:0 2px 10px #c8a95e30
}
.gen-confirm-btn:hover{background:var(--gold-lt);box-shadow:0 4px 16px #c8a95e40}

/* ── Character Modal ────────────────────────────────────────────── */
.char-modal-overlay{
  position:fixed;inset:0;background:#00000098;
  display:flex;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(4px)
}
.char-modal{
  background:var(--surf-1);border:1px solid var(--line-3);
  border-radius:var(--r-lg);width:580px;max-width:95vw;
  max-height:90vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 64px #000000a0
}
.char-modal-hdr{
  display:flex;align-items:center;padding:15px 20px;
  border-bottom:1px solid var(--line-2);flex-shrink:0
}
.char-modal-hdr h3{
  font-size:14px;color:var(--gold);font-weight:600;flex:1;letter-spacing:.04em
}
.char-modal-close{
  background:none;border:none;color:var(--txt-3);font-size:16px;
  cursor:pointer;padding:3px 8px;border-radius:var(--r-xs);line-height:1;
  transition:all .15s;font-family:inherit
}
.char-modal-close:hover{color:var(--txt-1);background:var(--surf-3)}
.char-reextract-btn{
  background:none;border:1px solid var(--line-3);color:var(--txt-3);
  font-size:11px;padding:3px 10px;border-radius:var(--r-xs);
  cursor:pointer;transition:all .15s;margin-right:7px;font-family:inherit
}
.char-reextract-btn:hover{background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)}
.char-reextract-btn:disabled{opacity:.35;cursor:not-allowed}
.char-modal-body{display:flex;gap:20px;padding:20px;overflow-y:auto;flex:1}
.char-modal-left{width:155px;flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.char-modal-avatar{
  width:155px;height:207px;background:var(--surf-3);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid var(--line-3)
}
.char-modal-avatar-ph{font-size:44px;color:var(--txt-4);font-weight:700}
.char-img-btn{
  width:100%;padding:7px 0;border-radius:var(--r-sm);
  border:1px solid var(--line-3);background:transparent;
  color:var(--txt-2);font-size:12px;cursor:pointer;
  transition:all .15s;font-family:inherit
}
.char-img-btn:hover{background:var(--surf-3);color:var(--gold);border-color:var(--gold-dim)}
.char-img-btn:disabled{opacity:.35;cursor:not-allowed}
.char-modal-right{flex:1;display:flex;flex-direction:column;gap:11px}
.char-field label{
  font-size:10.5px;font-weight:700;color:var(--txt-3);display:block;
  margin-bottom:5px;letter-spacing:.09em;text-transform:uppercase
}
.char-field input,.char-field select,.char-field textarea{
  width:100%;background:var(--surf-2);border:1px solid var(--line-3);
  border-radius:var(--r-sm);color:var(--txt-1);font-size:13px;
  font-family:inherit;padding:7px 11px;outline:none;transition:border-color .2s
}
.char-field input:focus,.char-field textarea:focus{border-color:var(--gold-dim)}
.char-field textarea{resize:none;height:62px;line-height:1.55}
#char-f-genprompt{
  height:108px;resize:vertical;font-size:12px;
  color:var(--txt-2);line-height:1.65
}
.char-field select{cursor:pointer}
.char-field select option{background:var(--surf-1)}
.char-modal-footer{
  display:flex;align-items:center;padding:13px 20px;
  border-top:1px solid var(--line-2);flex-shrink:0;gap:8px
}
.char-delete-btn{
  background:none;border:1px solid color-mix(in srgb,var(--danger) 35%,transparent);
  color:color-mix(in srgb,var(--danger) 70%,transparent);
  font-size:12.5px;padding:6px 14px;border-radius:var(--r-sm);
  cursor:pointer;transition:all .15s;font-family:inherit
}
.char-delete-btn:hover{
  background:color-mix(in srgb,var(--danger) 12%,transparent);
  color:var(--danger);border-color:var(--danger)
}
.char-save-btn{
  margin-left:auto;background:var(--gold);color:#0e0a02;border:none;
  font-size:13px;font-weight:700;padding:7px 20px;
  border-radius:var(--r-sm);cursor:pointer;transition:all .15s;
  font-family:inherit;box-shadow:0 2px 8px #c8a95e28
}
.char-save-btn:hover{background:var(--gold-lt);box-shadow:0 4px 14px #c8a95e40}

/* ── Image Lightbox ─────────────────────────────────────────────── */
.img-lightbox{
  position:fixed;inset:0;background:#000000e0;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:300;cursor:zoom-out;padding:24px;backdrop-filter:blur(8px)
}
.img-lightbox img{
  max-width:90vw;max-height:86vh;object-fit:contain;
  border-radius:var(--r-sm);box-shadow:0 12px 60px #000000b0;pointer-events:none
}
.img-lightbox-name{
  margin-top:14px;font-size:13px;
  color:color-mix(in srgb,var(--gold) 80%,transparent);pointer-events:none;
  letter-spacing:.04em
}

/* ── Generation shimmer ─────────────────────────────────────────── */
@keyframes gen-shimmer{
  0%  {background-position:-200% center}
  100%{background-position: 200% center}
}
.content-panel.is-generating .content-toolbar{
  background:linear-gradient(
    90deg,
    var(--surf-1) 20%,
    color-mix(in srgb,var(--gold) 10%,var(--surf-1)) 50%,
    var(--surf-1) 80%
  );
  background-size:200% auto;
  animation:gen-shimmer 2s linear infinite
}

/* prefers-reduced-motion: skip decorative animations */
@media(prefers-reduced-motion:reduce){
  .content-panel.is-generating .content-toolbar{animation:none}
}
</style>
</head>
<body>
<header>
  <button class="hdr-btn" id="back-home-btn" onclick="goto('#/')" style="display:none">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    首页
  </button>
  <h1>短视频剧本生成器</h1>

  <div class="step-bar" id="step-bar">
    <div class="step active" id="s1">需求</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s2">世界观</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s3">大纲</div>
    <span class="step-arrow">›</span>
    <div class="step" id="s4">剧本</div>
  </div>

  <div class="hdr-actions">
    <!-- 创作视图专属按钮 -->
    <button class="hdr-char-btn" id="char-btn" onclick="openCharPanel()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/>
      </svg>
      角色
      <span class="char-count-badge" id="char-count">0</span>
    </button>

    <div class="hdr-divider" id="hdr-div-creation" style="display:none"></div>

    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
    <div class="hdr-divider"></div>

    <button class="hdr-btn-outline" id="history-btn" onclick="toggleHistory()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="12 8 12 12 14 14"/>
        <path d="M3.05 11a9 9 0 1 0 .5-4"/><polyline points="3 3 3 7 7 7"/>
      </svg>
      历史
    </button>

    <button class="primary-hdr-btn" id="new-proj-btn" onclick="goto('#/project/new')" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新建剧本
    </button>
  </div>
</header>

<div id="home-view" style="display:none;flex-direction:column;flex:1;overflow:hidden;background:var(--bg)"></div>
<div class="layout">
  <!-- ── Chat ── -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="chat-footer">
      <div class="chips-row" id="chips"></div>
      <div id="refine-hint" style="display:none"></div>
      <div class="input-row">
        <textarea id="input" rows="3" placeholder="描述你的故事想法…"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Content ── -->
  <div class="content-panel">

    <!-- 项目历史面板（覆盖层） -->
    <div class="history-panel" id="history-panel" style="display:none">
      <div class="history-hdr">
        <h2>项目历史</h2>
        <button class="h-close" onclick="closeHistory()">✕</button>
      </div>
      <div class="history-body">
        <!-- 左：项目列表 -->
        <div class="h-list" id="h-list">
          <div class="h-list-empty">加载中…</div>
        </div>
        <!-- 右：项目详情 -->
        <div class="h-detail">
          <div class="h-detail-hdr" id="h-detail-hdr" style="display:none">
            <div class="h-detail-title" id="h-detail-title"></div>
            <div class="h-detail-sub" id="h-detail-sub"></div>

          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>

<script>
// ══════════════════════════════════════════════════════════════════
//  主创作流程
// ══════════════════════════════════════════════════════════════════

// ── Animation helpers (GSAP) ─────────────────────────────────────
const anim = {
  // 单元素：消息气泡、内容区块
  in(el, opts = {}) {
    if (!el) return;
    gsap.from(el, { opacity: 0, y: 12, duration: 0.28, ease: 'power2.out', clearProps: 'all', ...opts });
  },
  // 内容面板切换（从右滑入）
  contentIn(el) {
    if (!el) return;
    gsap.from(el, { opacity: 0, x: 18, duration: 0.35, ease: 'power2.out', clearProps: 'all' });
  },
  // 卡片错开入场
  cardsIn(selector, stagger = 0.05) {
    const els = document.querySelectorAll(selector);
    if (!els.length) return;
    gsap.from(els, {
      opacity: 0, y: 18, scale: 0.96,
      duration: 0.32, stagger, ease: 'back.out(1.4)', clearProps: 'all'
    });
  },
  // chips / toolbar 按钮错开
  chipsIn(selector) {
    const els = document.querySelectorAll(selector);
    if (!els.length) return;
    gsap.from(els, { opacity: 0, y: 6, duration: 0.18, stagger: 0.04, ease: 'power2.out', clearProps: 'all' });
  },
  // 生成中 shimmer
  genStart() { document.querySelector('.content-panel')?.classList.add('is-generating'); },
  genEnd()   { document.querySelector('.content-panel')?.classList.remove('is-generating'); },
};

const S = {
  phase:'chat', projectId:null,
  messages:[], requirements:'', worldbuilding:'', outline:'',
  episodeCount:15, episodes:{}, generating:false,
  pendingAction:null,
  characters:[],
};

// ── Router ──────────────────────────────────────────────────────────────────

function goto(hash) {
  location.hash = hash;
}

function showHomeView() {
  closeCharPanel();
  $('home-view').style.display         = 'flex';
  document.querySelector('.layout').style.display = 'none';
  $('step-bar').style.display          = 'none';
  $('back-home-btn').style.display     = 'none';
  $('history-btn').style.display       = '';
  $('new-proj-btn').style.display      = '';
  $('char-btn').style.display          = 'none';
  $('hdr-div-creation').style.display  = 'none';
}

function showCreationView() {
  $('home-view').style.display         = 'none';
  document.querySelector('.layout').style.display = 'flex';
  $('step-bar').style.display          = '';
  $('back-home-btn').style.display     = '';
  $('history-btn').style.display       = '';
  $('new-proj-btn').style.display      = 'none';
  $('char-btn').style.display          = '';
  $('hdr-div-creation').style.display  = '';
}

async function router() {
  const hash = location.hash || '#/';
  if (hash === '#/' || hash === '') {
    showHomeView();
    await loadHome();
  } else if (hash === '#/project/new') {
    showCreationView();
    initNewProject();
  } else if (hash.startsWith('#/project/')) {
    const pid = hash.replace('#/project/', '');
    showCreationView();
    await loadProject(pid);
  }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', () => { router(); updateThemeBtn(); });

// ── Creation Page Init ───────────────────────────────────────────────────────

function initNewProject() {
  Object.assign(S, {
    phase:'chat', projectId:null, messages:[], requirements:'',
    worldbuilding:'', outline:'', episodeCount:15, episodes:{},
    characters:[], generating:false, pendingAction:null,
  });
  $('messages').innerHTML = '';
  $('cbody').innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <p>和左侧 AI 描述你的故事想法</p>
      <small>世界观 → 大纲 → 分集剧本，一条龙生成</small>
    </div>`;
  setChips([]); setToolbar([]);
  $('refine-hint').style.display = 'none';
  closeHistory(); closeCharPanel();
  S.characters = [];
  updateCharBtn();
  setStep(1);
  document.querySelector('.layout').classList.add('chat-focus');
  appendMsg('assistant',
    '你好！我是你的短视频剧本助手，专注古装/玄幻类型 ✨\n\n先聊聊你想要什么样的故事——\n\n你的主角是什么人？有什么特别的身份或能力？');
  $input().value = ''; $input().style.height = 'auto'; $input().focus();
}

async function loadProject(pid) {
  $('messages').innerHTML = '';
  $('cbody').innerHTML =
    '<div class="empty-state"><p style="color:var(--txt-3)">加载中…</p></div>';
  setStep(1);
  try {
    const resp = await fetch(`/api/project/${pid}`);
    if (!resp.ok) throw new Error();
    restoreProject(await resp.json());
  } catch {
    appendMsg('system', '项目加载失败，请返回首页重试');
  }
}

// ── Home View ────────────────────────────────────────────────────────────────

async function loadHome() {
  const hv = $('home-view');
  hv.innerHTML = `<div class="home-body" id="home-body">
    <div class="home-empty"><p>加载中…</p></div>
  </div>`;
  try {
    const resp = await fetch('/api/projects');
    const list = await resp.json();
    renderHomeList(list);
  } catch {
    $('home-body').innerHTML =
      '<div class="home-empty"><p>加载失败，请刷新重试</p></div>';
  }
}

function renderHomeList(list) {
  const body = $('home-body');
  if (!list.length) {
    body.innerHTML = `<div class="home-empty">
      <p>还没有剧本项目</p>
      <small>点击右上角「+ 新建剧本」开始创作</small>
    </div>`;
    return;
  }
  body.innerHTML = `
    <div class="home-section-title">全部项目（${list.length} 个）</div>
    <div class="proj-grid-home" id="proj-grid-home"></div>`;
  const grid = $('proj-grid-home');
  list.forEach(p => grid.appendChild(makeHomeCard(p)));
  anim.cardsIn('.proj-card-home', 0.05);
}

function makeHomeCard(p) {
  const card = document.createElement('div');
  card.className = 'proj-card-home';
  card.id = `hcard-${p.id}`;
  const progress = p.phase === 'episodes' && p.episodeCount
    ? `${p.episodesDone}/${p.episodeCount} 集` : '';
  card.innerHTML = `
    <div class="pch-title">《${p.title}》</div>
    <div class="pch-meta">
      <span class="phase-badge ${p.phase}">${phaseLabel[p.phase] || p.phase}</span>
      ${progress ? `<span class="pch-progress">${progress}</span>` : ''}
    </div>
    <div class="pch-footer">
      <span class="pch-time">${p.updated || ''}</span>
      <button class="pch-delete" title="删除项目"
        onclick="deleteProject('${p.id}',event)">×</button>
    </div>`;
  card.onclick = () => goto(`#/project/${p.id}`);
  return card;
}

async function deleteProject(id, event) {
  event.stopPropagation();
  if (!confirm('删除后无法恢复，确认删除此项目？')) return;
  try {
    await fetch(`/api/project/${id}`, { method: 'DELETE' });
    $(`hcard-${id}`)?.remove();
    const grid = $('proj-grid-home');
    if (grid && grid.children.length === 0) renderHomeList([]);
  } catch {
    alert('删除失败，请重试');
  }
}

const $ = id => document.getElementById(id);
const $input   = () => $('input');
const $sendBtn = () => $('send-btn');

$input().addEventListener('input', () => {
  const el = $input(); el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight, window.innerHeight * 0.4)+'px';
});

function setLoading(v) {
  S.generating=v; $sendBtn().disabled=v; $input().disabled=v;
}

// ── Messages ──
function appendMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  if (role !== 'system') {
    const lbl = document.createElement('div');
    lbl.className = 'msg-lbl';
    lbl.textContent = role==='user'?'你':'AI 助手';
    wrap.appendChild(lbl);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  $('messages').appendChild(wrap);
  anim.in(wrap, { y: 8, duration: 0.22 });
  $('messages').scrollTop = $('messages').scrollHeight;
  return bubble;
}

function appendStreamMsg(role) {
  const b = appendMsg(role,'');
  b.innerHTML = '<span class="typing-cursor"></span>';
  return b;
}

// ── SSE ──
async function streamPost(url, body, onChunk) {
  const resp = await fetch(url,{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf='', full='';
  while(true) {
    const {done,value} = await reader.read(); if(done) break;
    buf += dec.decode(value,{stream:true});
    const lines = buf.split('\n'); buf = lines.pop();
    for(const line of lines) {
      if(!line.startsWith('data: ')) continue;
      const d = JSON.parse(line.slice(6));
      if(d.type==='chunk') { onChunk(d.text); full+=d.text; }
      if(d.type==='done') full=d.full;
    }
  }
  return full;
}

// ── Chips / Toolbar ──
function setChips(defs) {
  $('chips').innerHTML='';
  defs.forEach(({label,cls,fn})=>{
    const b=document.createElement('button');
    b.className=`chip ${cls||''}`; b.textContent=label; b.onclick=fn;
    $('chips').appendChild(b);
  });
  if (defs.length) anim.chipsIn('#chips .chip');
}
function setToolbar(defs) {
  $('toolbar').innerHTML='';
  defs.forEach(({label,cls,fn})=>{
    const b=document.createElement('button');
    b.className=`chip ${cls||''}`; b.textContent=label; b.onclick=fn;
    $('toolbar').appendChild(b);
  });
  if (defs.length) anim.chipsIn('#toolbar .chip');
}

// ── 修改模式 ──
function enterRefineMode(action, hint) {
  S.pendingAction=action;
  const el=$('refine-hint'); el.style.display='flex'; el.className='refine-hint';
  el.innerHTML=`<span>${hint}</span><span class="refine-cancel" onclick="cancelRefine()">取消</span>`;
  $input().placeholder='输入修改意见，Enter 发送…'; $input().focus();
}
function cancelRefine() {
  S.pendingAction=null; $('refine-hint').style.display='none';
  $input().placeholder='描述你的故事想法…';
}

// ── 统一发送 ──
async function handleSend() {
  const text=$input().value.trim();
  if(!text||S.generating) return;
  $input().value=''; $input().style.height='auto';
  if(S.pendingAction) {
    const a=S.pendingAction; cancelRefine(); appendMsg('user',text);
    if(a.type==='episode') await doRefineEpisode(a.num,text);
    else await doRefineContent(a.type,text);
    return;
  }
  appendMsg('user',text);
  S.messages.push({role:'user',content:text});
  setLoading(true); setChips([]);
  if (S.messages.length === 1 && !S.projectId) {
    const tempTitle = text.replace(/\s+/g,'').slice(0,20) || '新故事';
    try {
      const r = await fetch('/api/project',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title:tempTitle, phase:'chat', messages:S.messages}),
      });
      const {id} = await r.json();
      S.projectId = id;
      history.replaceState(null,'',`#/project/${id}`);
    } catch { /* saveProject will handle it later */ }
  }
  const b=appendStreamMsg('assistant'); let full='',started=false;
  try {
    full=await streamPost('/api/chat',{messages:S.messages},chunk=>{
      if(!started){b.innerHTML='';started=true;}
      b.textContent+=chunk; $('messages').scrollTop=$('messages').scrollHeight;
    });
  } catch { b.textContent='网络错误，请重试'; setLoading(false); return; }
  b.textContent=full.replace(/\n?READY\s*$/,'').trim();
  S.messages.push({role:'assistant',content:full});
  setLoading(false);
  if(full.includes('READY')) showReadyChips();
}

// ── Phase 1→2 世界观 ──
function showReadyChips() {
  const row=document.createElement('div'); row.className='num-row';
  row.innerHTML=`<label>集数：</label>
    <input class="num-input" id="ep-count" type="number" min="5" max="30" value="15">
    <button class="chip primary" onclick="startWorldbuilding()">生成世界观 →</button>`;
  $('chips').innerHTML=''; $('chips').appendChild(row);
}

async function startWorldbuilding() {
  S.episodeCount=parseInt($('ep-count')?.value||15);
  document.querySelector('.layout').classList.remove('chat-focus');
  // content panel slides in from right
  requestAnimationFrame(() => anim.contentIn(document.querySelector('.content-panel')));
  setChips([]); setStep(2);
  const sumMsgs=[...S.messages,{role:'user',
    content:'请用150字内总结我的故事需求：主角、世界观类型、核心矛盾、情感基调、爽点关键词。直接输出，不要寒暄。'}];
  const sb=appendStreamMsg('assistant'); setLoading(true);
  let req='',started=false;
  try {
    req=await streamPost('/api/chat',{messages:sumMsgs},c=>{
      if(!started){sb.innerHTML='';started=true;}
      sb.textContent+=c; req+=c; $('messages').scrollTop=$('messages').scrollHeight;
    });
  } catch { sb.textContent='整理失败'; setLoading(false); return; }
  S.requirements=req;
  appendMsg('system','正在构建世界观…');
  $('ctitle').textContent='世界观设定 · 生成中';
  $('cbody').innerHTML='<div class="rendered" id="main-render"></div>';
  anim.genStart();
  const r=$('main-render'); let wb='';
  try {
    wb=await streamPost('/api/worldbuilding',{requirements:req},c=>{
      wb+=c; r.innerHTML=md(wb)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch { r.textContent='生成失败'; setLoading(false); anim.genEnd(); return; }
  r.innerHTML=md(wb); S.worldbuilding=wb;
  anim.genEnd(); anim.contentIn($('cbody'));
  $('ctitle').textContent='世界观设定'; setLoading(false);
  saveProject(); showWorldbuildingActions();
  appendMsg('assistant','世界观设定完成！可以直接生成大纲，或告诉我需要修改的地方。');
}
function showWorldbuildingActions() {
  const hasOutline = !!S.outline;
  const hasEpisodes = S.outline && (S.phase==='episodes' || Object.keys(S.episodes).length>0);
  const forwardChip = hasEpisodes
    ? {label:'→ 返回剧本列表', cls:'primary', fn:backToEpisodes}
    : hasOutline
      ? {label:'→ 返回大纲',    cls:'primary', fn:backToOutline}
      : {label:'继续生成大纲 →',cls:'primary', fn:startOutline};
  setChips([
    forwardChip,
    {label:'修改世界观',fn:()=>enterRefineMode({type:'worldbuilding'},'📝 修改世界观')},
    {label:'重新生成世界观',fn:startWorldbuilding},
  ]);
  setToolbar([
    {label:'修改世界观', fn:()=>enterRefineMode({type:'worldbuilding'},'📝 修改世界观')},
  ]);
  updateCharBtn();
}

function backToWorldbuilding() {
  setStep(2);
  $('ctitle').textContent='世界观设定';
  $('cbody').innerHTML=`<div class="rendered">${md(S.worldbuilding)}</div>`;
  anim.contentIn($('cbody'));
  showWorldbuildingActions();
}

function backToOutline() {
  setStep(3);
  $('ctitle').textContent=`故事大纲 · ${S.episodeCount} 集`;
  $('cbody').innerHTML=`<div class="rendered">${md(S.outline)}</div>`;
  anim.contentIn($('cbody'));
  showOutlineActions();
}

// ── Phase 2→3 大纲 ──
async function startOutline() {
  setChips([]); setStep(3);
  appendMsg('system',`正在生成 ${S.episodeCount} 集大纲…`);
  $('ctitle').textContent=`故事大纲 · ${S.episodeCount} 集 · 生成中`;
  $('cbody').innerHTML='<div class="rendered" id="main-render"></div>';
  anim.genStart();
  const r=$('main-render'); let ol=''; setLoading(true);
  try {
    ol=await streamPost('/api/outline',{requirements:S.requirements,
      worldbuilding:S.worldbuilding,episode_count:S.episodeCount},c=>{
      ol+=c; r.innerHTML=md(ol)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch { r.textContent='生成失败'; setLoading(false); anim.genEnd(); return; }
  r.innerHTML=md(ol); S.outline=ol;
  anim.genEnd(); anim.contentIn($('cbody'));
  $('ctitle').textContent=`故事大纲 · ${S.episodeCount} 集`; setLoading(false);
  saveProject(); showOutlineActions();
  appendMsg('assistant','大纲已生成！满意就继续，或者告诉我需要调整的地方。');
}
function showOutlineActions() {
  const hasEpisodes = S.phase==='episodes' || Object.keys(S.episodes).length>0;
  const forwardChip = hasEpisodes
    ? {label:'→ 返回剧本列表', cls:'primary', fn:backToEpisodes}
    : {label:'继续生成剧本 →', cls:'primary', fn:startEpisodes};
  setChips([
    forwardChip,
    {label:'修改大纲',fn:()=>enterRefineMode({type:'outline'},'📝 修改大纲')},
    {label:'重新生成大纲',fn:startOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
  setToolbar([
    {label:'修改大纲',fn:()=>enterRefineMode({type:'outline'},'📝 修改大纲')},
    {label:'重新生成大纲',fn:startOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
}

// ── Phase 3→4 剧本 ──
function startEpisodes() {
  setChips([]); setStep(4);
  $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
  renderEpisodeGrid();
  setToolbar([
    {label:'全部自动生成',fn:generateAll},
    {label:'导出剧本文件',fn:exportProject},
    {label:'← 修改大纲',fn:backToOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
  appendMsg('assistant',`大纲就绪！点右侧卡片逐集生成，或「全部自动生成」一键完成全部 ${S.episodeCount} 集。`);
}

function renderEpisodeGrid() {
  const g=document.createElement('div'); g.className='ep-grid'; g.id='ep-grid';
  for(let i=1;i<=S.episodeCount;i++) g.appendChild(makeEpCard(i));
  $('cbody').innerHTML=''; $('cbody').appendChild(g);
  anim.cardsIn('.ep-card', 0.035);
}

function makeEpCard(num) {
  const card=document.createElement('div'); card.id=`ep-${num}`;
  const done=!!S.episodes[num]; card.className=`ep-card ${done?'done':''}`;
  card.innerHTML=`
    <div class="ep-num">第 ${num} 集</div>
    <div class="ep-card-title">${done?'已生成':'点击生成'}</div>
    <div class="ep-status">${done?'✓ 完成':'待生成'}</div>
    ${done?`<div class="ep-actions">
      <button class="ep-action-btn" onclick="viewEpisode(${num});event.stopPropagation()">查看</button>
      <button class="ep-action-btn" onclick="requestRefineEpisode(${num});event.stopPropagation()">修改</button>
    </div>`:''}`;
  if(!done) card.onclick=()=>generateEpisode(num);
  return card;
}
function refreshEpCard(num) { const o=$(`ep-${num}`); if(o) o.replaceWith(makeEpCard(num)); }

async function generateEpisode(num) {
  if(S.generating) return;
  const card=$(`ep-${num}`);
  if(card){card.className='ep-card generating';card.querySelector('.ep-card-title').textContent='生成中…';}
  showEpContent(num,'',true); anim.genStart(); setLoading(true);
  const r=$('main-render'); let raw='';
  try {
    raw=await streamPost('/api/episode',{outline:S.outline,episode_num:num},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch {
    if(card){card.className='ep-card';card.querySelector('.ep-card-title').textContent='失败，点击重试';}
    setLoading(false); anim.genEnd(); return;
  }
  r.innerHTML=md(raw); S.episodes[num]=raw; anim.genEnd(); setLoading(false);
  refreshEpCard(num); $('ctitle').textContent=`第 ${num} 集 · 完成`;
  setToolbar([
    {label:`修改第 ${num} 集`,fn:()=>requestRefineEpisode(num)},
    {label:'← 返回列表',fn:backToGrid},
    {label:'导出剧本文件',fn:exportProject},
  ]);
  saveProject();
}

async function generateAll() {
  for(let i=1;i<=S.episodeCount;i++) {
    if(S.episodes[i]) continue;
    await generateEpisode(i);
    await new Promise(r=>setTimeout(r,200)); backToGrid();
  }
  appendMsg('assistant',`全部 ${S.episodeCount} 集生成完毕！`);
}

function showEpContent(num, content, streaming=false) {
  $('ctitle').textContent=`第 ${num} 集${streaming?' · 生成中':''}`;
  $('cbody').innerHTML='<div class="rendered" id="main-render"></div>';
  if(content&&!streaming) $('main-render').innerHTML=md(content);
  setToolbar([
    {label:`修改第 ${num} 集`,fn:()=>requestRefineEpisode(num)},
    {label:'← 返回列表',fn:backToGrid},
    {label:'导出剧本文件',fn:exportProject},
  ]);
}
function viewEpisode(num) { showEpContent(num,S.episodes[num]||''); }
function backToGrid() {
  $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
  renderEpisodeGrid();
  setToolbar([
    {label:'全部自动生成',fn:generateAll},
    {label:'导出剧本文件',fn:exportProject},
    {label:'← 修改大纲',fn:backToOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
}

function requestRefineEpisode(num) {
  viewEpisode(num);
  enterRefineMode({type:'episode',num},`📝 修改第 ${num} 集`);
}
async function doRefineEpisode(num, feedback) {
  const orig=S.episodes[num]||'';
  showEpContent(num,'',true); setLoading(true);
  const r=$('main-render'); let raw='';
  try {
    raw=await streamPost('/api/refine',{content:orig,feedback},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch { r.textContent='修改失败'; setLoading(false); return; }
  r.innerHTML=md(raw); S.episodes[num]=raw;
  $('ctitle').textContent=`第 ${num} 集 · 已修改`; setLoading(false);
  refreshEpCard(num); saveProject();
  setToolbar([
    {label:`继续修改第 ${num} 集`,fn:()=>requestRefineEpisode(num)},
    {label:'← 返回列表',fn:backToGrid},
    {label:'导出剧本文件',fn:exportProject},
  ]);
  appendMsg('assistant',`第 ${num} 集修改完成 ✓`);
}

async function doRefineContent(target, feedback) {
  const orig=target==='worldbuilding'?S.worldbuilding:S.outline;
  const label=target==='worldbuilding'?'世界观':'大纲';
  $('ctitle').textContent=`${label} · 修改中`;
  $('cbody').innerHTML='<div class="rendered" id="main-render"></div>';
  const r=$('main-render'); setLoading(true); let raw='';
  try {
    raw=await streamPost('/api/refine',{content:orig,feedback},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('cbody').scrollTop=$('cbody').scrollHeight;
    });
  } catch { r.textContent='修改失败'; setLoading(false); return; }
  r.innerHTML=md(raw); setLoading(false);

// ── Steps ──
function setStep(n) {
  S.phase=['chat','worldbuilding','outline','episodes'][n-1];
  // clickable[i] = true 时该步骤显示为 done（绿色胶囊，可点击跳回）
  const hasEp = S.outline && (n===4 || Object.keys(S.episodes).length > 0);
  const clickable = [false, !!S.worldbuilding, !!S.outline, !!hasEp];
  ['s1','s2','s3','s4'].forEach((id,i)=>{
    const active = i+1 === n;
    $(id).className = 'step' + (active ? ' active' : clickable[i] ? ' done' : '');
    $(id).title = (!active && clickable[i]) ? '点击返回此步骤' : '';
  });
  $('s2').onclick = S.worldbuilding ? backToWorldbuilding : null;
  $('s3').onclick = S.outline        ? backToOutline       : null;
  $('s4').onclick = hasEp            ? backToEpisodes      : null;
}

function backToEpisodes() {
  setStep(4);
  $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
  renderEpisodeGrid();
  setToolbar([
    {label:'全部自动生成',fn:generateAll},
    {label:'导出剧本文件',fn:exportProject},
    {label:'← 修改大纲',fn:backToOutline},
    {label:'← 修改世界观',fn:backToWorldbuilding},
  ]);
}

// ── Project 存档 ──
function extractTitle(outline) {
  const m=outline.match(/《(.+?)》/); return m?m[1]:'';
}
async function saveProject() {
  const title=extractTitle(S.outline)||S.requirements.slice(0,20)||'新故事';
  try {
    const resp=await fetch('/api/project',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id:S.projectId, title, phase:S.phase, messages:S.messages,
        requirements:S.requirements, worldbuilding:S.worldbuilding,
        outline:S.outline, episodeCount:S.episodeCount, episodes:S.episodes,
      })});
    const {id}=await resp.json(); S.projectId=id;
  } catch{ /* 静默失败 */ }
}

async function exportProject() {
  if(!S.projectId) { appendMsg('system','请先生成内容'); return; }
  try {
    const r=await fetch(`/api/export/${S.projectId}`,{method:'POST'});
    const {path}=await r.json();
    appendMsg('assistant',`剧本已导出！\n📁 ${path}`);
  } catch { appendMsg('system','导出失败'); }
}

// ── 恢复项目 ──
function restoreProject(data) {
  S.projectId=data.id; S.phase=data.phase||'chat';
  S.messages=data.messages||[]; S.requirements=data.requirements||'';
  S.worldbuilding=data.worldbuilding||''; S.outline=data.outline||'';
  S.episodeCount=data.episodeCount||15; S.episodes=data.episodes||{};
  S.characters=data.characters||[];
  updateCharBtn();
  const layout = document.querySelector('.layout');
  if (S.phase === 'chat') layout.classList.add('chat-focus');
  else layout.classList.remove('chat-focus');

  $('messages').innerHTML='';
  S.messages.forEach(m=>{
    const text=m.content.replace(/\n?READY\s*$/,'').trim();
    if(text) appendMsg(m.role,text);
  });

  const phase=data.phase;
  if(phase==='episodes') {
    setStep(4); $('ctitle').textContent=`分集剧本 · 共 ${S.episodeCount} 集`;
    renderEpisodeGrid();
    setToolbar([{label:'全部自动生成',fn:generateAll},{label:'导出剧本文件',fn:exportProject}]);
    setChips([]);
    updateCharBtn();
  } else if(phase==='outline') {
    setStep(3); $('ctitle').textContent=`故事大纲 · ${S.episodeCount} 集`;
    $('cbody').innerHTML=`<div class="rendered">${md(S.outline)}</div>`;
    showOutlineActions();
    updateCharBtn();
  } else if(phase==='worldbuilding') {
    setStep(2); $('ctitle').textContent='世界观设定';
    $('cbody').innerHTML=`<div class="rendered">${md(S.worldbuilding)}</div>`;
    showWorldbuildingActions();
    updateCharBtn();
  } else {
    setStep(1); setChips([]);
  }
  closeHistory();
  appendMsg('assistant',`已恢复项目「${data.title}」，可从上次进度继续创作。`);
}

function renderProjectDetail(data) {

function renderContentTabs(data) {
  const row=$('h-tabs-row');
  row.style.display='flex'; row.innerHTML='';

  function addTab(label, section, hasDone) {
    const btn=document.createElement('button');
    btn.className='ctab'+(hasDone?' done':'');
    btn.textContent=label;
    btn.onclick=()=>selectSection(section, btn);
    if(!hasDone) btn.disabled=true;
    row.appendChild(btn);
  }

  addTab('世界观','worldbuilding',!!data.worldbuilding);
  addTab('大纲','outline',!!data.outline);

  for(let i=1;i<=data.episodeCount;i++) {
    const done=!!data.episodes?.[String(i)];
    addTab(`第${i}集`,{type:'episode',num:i},done);
  }

  // 默认选第一个有内容的 tab
  const first=row.querySelector('.ctab:not([disabled])');
  if(first) first.click();
}

function selectSection(section, btnEl) {
  document.querySelectorAll('#h-tabs-row .ctab').forEach(b=>b.classList.remove('active'));
  btnEl.classList.add('active');
  H.section=section;
  closeHistoryRefine();

  const data=H.project;
  let content='';
  if(section==='worldbuilding') content=data.worldbuilding||'';
  else if(section==='outline') content=data.outline||'';
  else content=data.episodes?.[String(section.num)]||'';

  H.sectionContent=content;
  $('h-content').innerHTML=`<div class="rendered">${md(content)}</div>`;

  // 只要有内容就可修改
  if(content) {
    const editBtn=document.createElement('button');
    editBtn.className='chip'; editBtn.style.cssText='margin:14px 0 0;display:block';
    editBtn.textContent='✏️ 修改此内容';
    editBtn.onclick=openHistoryRefine;
    $('h-content').appendChild(editBtn);
  }
}

function openHistoryRefine() {
  $('h-refine-bar').style.display='flex';
  $('h-refine-input').focus();
}
function closeHistoryRefine() {
  $('h-refine-bar').style.display='none';
  $('h-refine-input').value='';
}

$('h-refine-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();submitHistoryRefine();}
});

async function submitHistoryRefine() {
  const feedback=$('h-refine-input').value.trim();
  if(!feedback||!H.project||!H.section) return;
  $('h-refine-input').value=''; closeHistoryRefine();
  $('h-content').innerHTML='<div class="rendered" id="h-render"></div>';
  const r=$('h-render');

  let raw='';
  try {
    raw=await streamPost('/api/refine',{content:H.sectionContent,feedback},c=>{
      raw+=c; r.innerHTML=md(raw)+'<span class="typing-cursor"></span>';
      $('h-content').scrollTop=$('h-content').scrollHeight;
    });
  } catch { r.innerHTML='<div class="h-empty">修改失败</div>'; return; }

  r.innerHTML=md(raw);
  H.sectionContent=raw;

  // 局部更新项目
  const pid=H.project.id;
  let patchBody;
  if(H.section==='worldbuilding')     patchBody={field:'worldbuilding',content:raw};
  else if(H.section==='outline')      patchBody={field:'outline',content:raw};
  else patchBody={field:'episode',num:H.section.num,content:raw};

  try {
    await fetch(`/api/project/${pid}`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(patchBody)});
    // 更新本地缓存
    if(H.section==='worldbuilding')    H.project.worldbuilding=raw;
    else if(H.section==='outline')     H.project.outline=raw;
    else { H.project.episodes=H.project.episodes||{}; H.project.episodes[String(H.section.num)]=raw; }

    const saveOk=document.createElement('p');
    saveOk.style.cssText='font-size:11px;color:#4a8a4a;margin-top:10px';
    saveOk.textContent='✓ 已保存到项目';
    r.appendChild(saveOk);

    const editBtn=document.createElement('button');
    editBtn.className='chip'; editBtn.style.cssText='margin-top:10px;display:inline-block';
    editBtn.textContent='继续修改'; editBtn.onclick=openHistoryRefine;
    r.appendChild(editBtn);

    // 世界观修改后：提供重新生成大纲
    if(H.section==='worldbuilding' && H.project.requirements) {
      const regenBtn=document.createElement('button');
      regenBtn.className='chip primary'; regenBtn.style.cssText='margin-top:10px;margin-left:6px;display:inline-block';
      regenBtn.textContent='→ 重新生成大纲'; regenBtn.onclick=historyRegenOutline;
      r.appendChild(regenBtn);
    }
    // 大纲修改后：提供重新生成某集
    if(H.section==='outline') {
      const regenBtn=document.createElement('button');
      regenBtn.className='chip primary'; regenBtn.style.cssText='margin-top:10px;margin-left:6px;display:inline-block';
      regenBtn.textContent='→ 重新生成剧本集'; regenBtn.onclick=()=>showHistoryEpPicker();
      r.appendChild(regenBtn);
    }
  } catch {
    const fail=document.createElement('p');
    fail.style.cssText='font-size:11px;color:#8a4a4a;margin-top:10px';
    fail.textContent='⚠ 保存失败';
    r.appendChild(fail);
  }
}

function extractEpOutlinesFromText(outline) {
  const pattern=/\*\*第(\d+)集[^*]*\*\*/g;
  const parts=outline.split(pattern);
  const result=[];
  for(let i=1;i<parts.length;i+=2) result.push(`第${parts[i]}集 ${parts[i+1]||''}`);
  return result;
}
